# =============================================================================
# RedDB Helm chart values
# =============================================================================
# Four deployment modes:
#
#   mode: standalone        -> single StatefulSet, role=standalone (dev/demo default)
#   mode: serverless        -> single writer StatefulSet with serverless storage preset
#   mode: primary-replica   -> primary StatefulSet (1 pod) + optional replica StatefulSet (N pods)
#   mode: cluster           -> symmetric StatefulSet with stable identity + headless discovery
# =============================================================================

mode: standalone

nameOverride: ""
fullnameOverride: ""

# -----------------------------------------------------------------------------
# Image
# -----------------------------------------------------------------------------
image:
  repository: ghcr.io/reddb-io/reddb
  # Defaults to .Chart.AppVersion when empty
  tag: ""
  pullPolicy: IfNotPresent
  pullSecrets: []

# -----------------------------------------------------------------------------
# Storage/deploy profile
# -----------------------------------------------------------------------------
# These values compile to the REDDB_STORAGE_* env contract understood by `red`.
# When storage.preset is empty, the chart derives it from mode:
#   standalone      -> embedded
#   serverless      -> serverless
#   primary-replica -> primary-replica-production-ha
#   cluster         -> cluster
storage:
  # Override the mode-derived preset. Valid values include:
  # embedded, serverless, primary-replica-dev, primary-replica-small,
  # primary-replica-production-ha, primary-replica-backup,
  # primary-replica-wal-retention, cluster.
  preset: ""
  # Optional lower-level overrides. Leave empty to let the preset decide.
  profile: ""
  packaging: ""
  managedBackup: ""
  walRetention: ""

# -----------------------------------------------------------------------------
# Remote backend / serverless storage
# -----------------------------------------------------------------------------
# Renders the cloud-agnostic RED_BACKEND / RED_REMOTE_KEY / RED_S3_* contract.
# The binary also accepts older REDDB_REMOTE_* names, but the chart emits the
# current names.
remote:
  enabled: false
  backend: "" # s3 | fs | http | none
  key: ""

  fs:
    path: ""

  http:
    url: ""
    prefix: ""
    conditionalWrites: false
    authHeader:
      value: ""
      existingSecret: ""
      existingSecretKey: auth-header

  s3:
    endpoint: ""
    bucket: ""
    region: us-east-1
    keyPrefix: ""
    pathStyle: true
    # Plain values are for local/dev only. Prefer existingSecret or file mounts.
    accessKey: ""
    secretKey: ""
    existingSecret: ""
    accessKeyKey: access-key
    secretKeyKey: secret-key

# -----------------------------------------------------------------------------
# Serverless lifecycle
# -----------------------------------------------------------------------------
serverless:
  autoRestore: true
  backupOnShutdown: true
  lease:
    required: false
    ttlSeconds: 60
    prefix: leases/

# -----------------------------------------------------------------------------
# Primary-replica commit policy
# -----------------------------------------------------------------------------
replication:
  # Leave empty for the binary default (`local`). Common values: local, remote_wal,
  # ack_n, ack_n=1, quorum.
  commitPolicy: ""
  commitAckN: ""
  commitDeadlineMs: ""

# -----------------------------------------------------------------------------
# Auth bootstrap
# -----------------------------------------------------------------------------
# When enabled, the writer pod receives REDDB_PRESET=production plus
# REDDB_USERNAME / REDDB_PASSWORD so first boot creates the initial admin
# through the policy-first bootstrap preset. Replica pods never receive
# these bootstrap env vars. Cluster mode rejects auth.enabled fail-closed: a
# symmetric member cannot prove it is the reserved global system range owner
# (ADR 0058), so the gate stays closed in lockstep with the runtime until the
# owner path lands (PRD #1227). See README.md "Cluster bootstrap contract".
auth:
  enabled: false
  username: admin
  # Plain password — only used when existingSecret is empty.
  # Strongly recommend using existingSecret for production.
  password: ""
  # Reference an existing Secret. Must contain keys: username, password
  existingSecret: ""

  # ---------------------------------------------------------------------------
  # Encrypted vault certificate (REDDB_CERTIFICATE / REDDB_CERTIFICATE_FILE).
  # ---------------------------------------------------------------------------
  # Required when config.vault=true. Three mutually-exclusive ways to provide
  # the cert. existingSecret > value (plaintext, dev-only). fileMount is
  # orthogonal — set it true to mount the secret as a file and pass
  # REDDB_CERTIFICATE_FILE instead of REDDB_CERTIFICATE.
  vault:
    enabled: false
    certificate:
      # Plaintext 64-char hex. DEV ONLY — leaks into rendered manifests.
      value: ""
      # Pre-existing Secret name (recommended for production).
      existingSecret: ""
      # Key inside the existing/managed secret holding the cert.
      existingSecretKey: certificate
      # Mount the secret as a file at fileMount.path and pass
      # REDDB_CERTIFICATE_FILE instead of REDDB_CERTIFICATE. Recommended
      # for FIPS / strict envs that audit env-var leakage.
      fileMount:
        enabled: false
        path: /run/secrets/reddb_certificate
    # Disabled fail-closed. The legacy hook bootstrapped an emptyDir DB,
    # not the writer PVC, so it could publish a certificate unrelated to
    # the real database. Bootstrap the writer volume manually instead.
    bootstrapJob:
      enabled: false
      username: admin
      # Secret name carrying a `password` key (and optionally `username`).
      passwordSecret: ""
      # Output Secret name written by the Job for the StatefulSet to consume.
      certificateSecretName: reddb-vault-cert
      backoffLimit: 0
      # Override the image used for the Job (defaults to the chart image).
      image: ""

# Arbitrary extra Secret/file mounts shared by all reddb pods.
# Each item: {name, secretName, mountPath, readOnly?}.
extraSecretMounts: []

# -----------------------------------------------------------------------------
# gRPC transport security (mutual TLS optional)
#
# When grpc.tls.enabled is true, the reddb pod also serves a TLS-terminated
# gRPC listener on the address `grpc.tls.bindAddr`. The plaintext gRPC
# listener can still be advertised on a separate port — operators commonly
# pin 55055 plaintext + 55555 TLS during a rollout.
#
# Optional mTLS: when grpc.tls.clientCa.secretName is set, the gRPC server
# requires every client to present a certificate that chains to a CA
# bundle in that secret. Without `clientCa`, only one-way TLS is enforced.
# -----------------------------------------------------------------------------
grpc:
  tls:
    enabled: false
    # In-pod bind address for the TLS gRPC listener. Plaintext gRPC
    # continues to listen on `service.grpcPort` unless disabled.
    bindAddr: "0.0.0.0:55555"
    # Source of the server cert + key. Both keys are read from this secret.
    secretName: ""
    certKey: "tls.crt"
    keyKey: "tls.key"
    # Mount path inside the pod (must be under /etc/reddb to satisfy the
    # readOnlyRootFilesystem securityContext).
    mountPath: "/etc/reddb/grpc-tls"
    # Optional client CA for mTLS. Pod boots without mTLS unless secretName
    # is non-empty.
    clientCa:
      secretName: ""
      key: "ca.crt"
      mountPath: "/etc/reddb/grpc-tls-client-ca"

# -----------------------------------------------------------------------------
# HTTP transport security (HTTPS termination)
#
# When http.tls.enabled is true, the reddb pod also serves a TLS-terminated
# HTTP listener on the address `http.tls.bindAddr`. The cert + key are
# mounted from a Kubernetes Secret in PEM form (one cert chain per secret).
#
# Optional mTLS: when http.tls.clientCa.secretName is set, every client
# request must present a certificate that chains to a CA bundle in that
# secret.
# -----------------------------------------------------------------------------
http:
  tls:
    enabled: false
    # In-pod bind address for the HTTPS listener.
    bindAddr: "0.0.0.0:55555"
    # Source of the server cert + key. Both keys are read from this secret.
    secretName: ""
    certKey: "tls.crt"
    keyKey: "tls.key"
    # Mount path inside the pod (must be under /etc/reddb to satisfy the
    # readOnlyRootFilesystem securityContext).
    mountPath: "/etc/reddb/http-tls"
    # Optional client CA for mTLS. Pod boots without mTLS unless secretName
    # is non-empty.
    clientCa:
      secretName: ""
      key: "ca.crt"
      mountPath: "/etc/reddb/http-tls-client-ca"

# -----------------------------------------------------------------------------
# Common server config
# -----------------------------------------------------------------------------
config:
  # RUST_LOG value (trace|debug|info|warn|error)
  logLevel: info
  # Enable encrypted auth vault (reserved pages in main .rdb file)
  vault: false
  # Mount a JSON config file for boot-time write-if-absent seeding into
  # red.config. REDDB_CONFIG_FILE points at mountPath when enabled.
  file:
    enabled: false
    mountPath: /etc/reddb/config.json
    # Use an existing ConfigMap with key `key`, or provide `inline` below and
    # let the chart create one.
    existingConfigMap: ""
    key: config.json
    inline: {}
  # Extra envFrom entries appended to every RedDB container.
  extraEnvFrom: []
  # Extra environment variables, list of {name, value} or {name, valueFrom}
  extraEnv: []
  # Extra CLI args appended to the `red server` / `red replica` command
  extraArgs: []

# -----------------------------------------------------------------------------
# RBAC / ServiceAccount
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

# -----------------------------------------------------------------------------
# Pod metadata + security
# -----------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}

# Non-root runtime defaults used by the chart. Override if your image variant
# uses a different numeric user.
podSecurityContext:
  fsGroup: 10001
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  capabilities:
    drop: ["ALL"]

# -----------------------------------------------------------------------------
# Primary node
#   - In `standalone` mode this is the only StatefulSet rendered.
#   - In `primary-replica` mode this is the single writer.
# -----------------------------------------------------------------------------
primary:
  # Always 1 — RedDB has a single-writer primary by design.
  replicaCount: 1

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  persistence:
    enabled: true
    storageClass: ""
    accessModes: ["ReadWriteOnce"]
    size: 10Gi
    annotations: {}

  service:
    type: ClusterIP
    annotations: {}
    wirePort: 5050
    grpcPort: 55055
    # gRPC TLS port — only exposed when grpc.tls.enabled is true.
    grpcTlsPort: 55555
    httpPort: 5000
    # HTTP TLS (HTTPS) port — only exposed when http.tls.enabled is true.
    httpTlsPort: 55555
    # Optional fixed nodePort values (only when type=NodePort)
    wireNodePort: ""
    grpcNodePort: ""
    grpcTlsNodePort: ""
    httpNodePort: ""
    httpTlsNodePort: ""

  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  terminationGracePeriodSeconds: 60

  updateStrategy:
    type: RollingUpdate

# -----------------------------------------------------------------------------
# Read replicas (only rendered when mode=primary-replica)
# -----------------------------------------------------------------------------
replica:
  replicaCount: 2

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  persistence:
    enabled: true
    storageClass: ""
    accessModes: ["ReadWriteOnce"]
    size: 10Gi
    annotations: {}

  service:
    type: ClusterIP
    annotations: {}
    wirePort: 5050
    grpcPort: 55055
    grpcTlsPort: 55555
    httpPort: 5000
    httpTlsPort: 55555

  nodeSelector: {}
  tolerations: []
  # When empty, a soft pod anti-affinity across hostnames is injected.
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  terminationGracePeriodSeconds: 60

  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0

# -----------------------------------------------------------------------------
# Cluster members (only rendered when mode=cluster)
# -----------------------------------------------------------------------------
cluster:
  replicaCount: 3

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

  persistence:
    enabled: true
    storageClass: ""
    accessModes: ["ReadWriteOnce"]
    size: 10Gi
    annotations: {}

  service:
    type: ClusterIP
    annotations: {}
    wirePort: 5050
    grpcPort: 55055
    grpcTlsPort: 55555
    httpPort: 5000
    httpTlsPort: 55555

  discovery:
    # Optional static peer list. Empty means the chart generates StatefulSet DNS
    # names: <release>-cluster-0.<headless>.<namespace>.svc.cluster.local:55055
    staticPeers: []

  nodeSelector: {}
  tolerations: []
  # When empty, a soft pod anti-affinity across hostnames is injected.
  affinity: {}
  topologySpreadConstraints: []
  priorityClassName: ""
  terminationGracePeriodSeconds: 60

  updateStrategy:
    type: RollingUpdate

# -----------------------------------------------------------------------------
# Probes — exec the local `red health` CLI against the in-pod HTTP port.
# -----------------------------------------------------------------------------
probes:
  startup:
    enabled: true
    periodSeconds: 5
    failureThreshold: 30
    timeoutSeconds: 3
  liveness:
    enabled: true
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 5
  readiness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# -----------------------------------------------------------------------------
# PodDisruptionBudget — applies to the replica StatefulSet in primary-replica
# mode and to the cluster StatefulSet in cluster mode.
# -----------------------------------------------------------------------------
pdb:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# -----------------------------------------------------------------------------
# NetworkPolicy
# -----------------------------------------------------------------------------
networkPolicy:
  enabled: false
  # Allow primary <-> replica traffic automatically (always added when enabled).
  # Additional ingress sources for client traffic:
  ingressFrom: []
  # Example:
  # ingressFrom:
  #   - podSelector:
  #       matchLabels:
  #         app: my-api
  #   - namespaceSelector:
  #       matchLabels:
  #         kubernetes.io/metadata.name: apps

# -----------------------------------------------------------------------------
# Ingress (HTTP only)
# -----------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: reddb.local
      paths:
        - path: /
          pathType: Prefix
          # Routes to primary HTTP service. Use "primary" or "replica".
          backend: primary
  tls: []

# -----------------------------------------------------------------------------
# Prometheus ServiceMonitor (requires prometheus-operator CRDs)
# -----------------------------------------------------------------------------
metrics:
  serviceMonitor:
    enabled: false
    namespace: ""
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    labels: {}
    relabelings: []
    metricRelabelings: []
