{{- include "reddb.validateMode" . -}}
{{- if ne .Values.mode "cluster" -}}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "reddb.primary.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reddb.labels" . | nindent 4 }}
    app.kubernetes.io/component: primary
spec:
  serviceName: {{ include "reddb.primary.headless" . }}
  replicas: 1
  podManagementPolicy: OrderedReady
  updateStrategy:
    {{- toYaml .Values.primary.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "reddb.primary.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "reddb.primary.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/auth: {{ include (print $.Template.BasePath "/secret-auth.yaml") . | sha256sum }}
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "reddb.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.primary.terminationGracePeriodSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.primary.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.primary.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.primary.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.primary.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.primary.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: reddb
          image: {{ include "reddb.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - server
            {{- with .Values.config.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          env:
            {{- include "reddb.commonEnv" . | nindent 12 }}
            - name: REDDB_WIRE_BIND_ADDR
              value: 0.0.0.0:{{ .Values.primary.service.wirePort }}
            - name: REDDB_GRPC_BIND_ADDR
              value: 0.0.0.0:{{ .Values.primary.service.grpcPort }}
            - name: REDDB_HTTP_BIND_ADDR
              value: 0.0.0.0:{{ .Values.primary.service.httpPort }}
            - name: REDDB_NODE_ROLE
              value: {{ ternary "primary" .Values.mode (eq .Values.mode "primary-replica") | quote }}
            {{- if .Values.http.tls.enabled }}
            - name: REDDB_HTTP_TLS_BIND
              value: {{ .Values.http.tls.bindAddr | quote }}
            - name: REDDB_HTTP_TLS_CERT
              value: {{ printf "%s/%s" .Values.http.tls.mountPath .Values.http.tls.certKey | quote }}
            - name: REDDB_HTTP_TLS_KEY
              value: {{ printf "%s/%s" .Values.http.tls.mountPath .Values.http.tls.keyKey | quote }}
            {{- if .Values.http.tls.clientCa.secretName }}
            - name: REDDB_HTTP_TLS_CLIENT_CA
              value: {{ printf "%s/%s" .Values.http.tls.clientCa.mountPath .Values.http.tls.clientCa.key | quote }}
            {{- end }}
            {{- end }}
            {{- if .Values.grpc.tls.enabled }}
            - name: REDDB_GRPC_TLS_BIND
              value: {{ .Values.grpc.tls.bindAddr | quote }}
            - name: REDDB_GRPC_TLS_CERT
              value: {{ printf "%s/%s" .Values.grpc.tls.mountPath .Values.grpc.tls.certKey | quote }}
            - name: REDDB_GRPC_TLS_KEY
              value: {{ printf "%s/%s" .Values.grpc.tls.mountPath .Values.grpc.tls.keyKey | quote }}
            {{- if .Values.grpc.tls.clientCa.secretName }}
            - name: REDDB_GRPC_TLS_CLIENT_CA
              value: {{ printf "%s/%s" .Values.grpc.tls.clientCa.mountPath .Values.grpc.tls.clientCa.key | quote }}
            {{- end }}
            {{- end }}
          {{- include "reddb.extraEnvFrom" . | nindent 10 }}
          ports:
            - name: wire
              containerPort: {{ .Values.primary.service.wirePort }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.primary.service.grpcPort }}
              protocol: TCP
            {{- if .Values.grpc.tls.enabled }}
            - name: grpc-tls
              containerPort: {{ .Values.primary.service.grpcTlsPort | default 55555 }}
              protocol: TCP
            {{- end }}
            - name: http
              containerPort: {{ .Values.primary.service.httpPort }}
              protocol: TCP
            {{- if .Values.http.tls.enabled }}
            - name: https
              containerPort: {{ .Values.primary.service.httpTlsPort | default 55555 }}
              protocol: TCP
            {{- end }}
          {{- include "reddb.probes" . | nindent 10 }}
          resources:
            {{- toYaml .Values.primary.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            {{- if .Values.grpc.tls.enabled }}
            - name: grpc-tls
              mountPath: {{ .Values.grpc.tls.mountPath }}
              readOnly: true
            {{- if .Values.grpc.tls.clientCa.secretName }}
            - name: grpc-tls-client-ca
              mountPath: {{ .Values.grpc.tls.clientCa.mountPath }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- if .Values.http.tls.enabled }}
            - name: http-tls
              mountPath: {{ .Values.http.tls.mountPath }}
              readOnly: true
            {{- if .Values.http.tls.clientCa.secretName }}
            - name: http-tls-client-ca
              mountPath: {{ .Values.http.tls.clientCa.mountPath }}
              readOnly: true
            {{- end }}
            {{- end }}
            {{- include "reddb.configFileVolumeMount" . | nindent 12 }}
            {{- include "reddb.vaultVolumeMount" . | nindent 12 }}
            {{- include "reddb.extraSecretVolumeMounts" . | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if not .Values.primary.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- if .Values.grpc.tls.enabled }}
        - name: grpc-tls
          secret:
            secretName: {{ required "grpc.tls.secretName is required when grpc.tls.enabled" .Values.grpc.tls.secretName }}
            defaultMode: 0o400
        {{- if .Values.grpc.tls.clientCa.secretName }}
        - name: grpc-tls-client-ca
          secret:
            secretName: {{ .Values.grpc.tls.clientCa.secretName }}
            defaultMode: 0o444
        {{- end }}
        {{- end }}
        {{- if .Values.http.tls.enabled }}
        - name: http-tls
          secret:
            secretName: {{ required "http.tls.secretName is required when http.tls.enabled" .Values.http.tls.secretName }}
            defaultMode: 0o400
        {{- if .Values.http.tls.clientCa.secretName }}
        - name: http-tls-client-ca
          secret:
            secretName: {{ .Values.http.tls.clientCa.secretName }}
            defaultMode: 0o444
        {{- end }}
        {{- end }}
        {{- include "reddb.configFileVolume" . | nindent 8 }}
        {{- include "reddb.vaultVolume" . | nindent 8 }}
        {{- include "reddb.extraSecretVolumes" . | nindent 8 }}
  {{- if .Values.primary.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "reddb.primary.selectorLabels" . | nindent 10 }}
        {{- with .Values.primary.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.primary.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.primary.persistence.size | quote }}
        {{- if .Values.primary.persistence.storageClass }}
        storageClassName: {{ .Values.primary.persistence.storageClass | quote }}
        {{- end }}
  {{- end }}
{{- end }}
