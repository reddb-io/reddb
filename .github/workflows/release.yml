name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - next
      version:
        description: Optional version for stable (e.g. 0.1.2)
        required: false

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: red

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.plan.outputs.should_skip }}
      release_channel: ${{ steps.plan.outputs.release_channel }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      package_version: ${{ steps.plan.outputs.package_version }}
      github_prerelease: ${{ steps.plan.outputs.github_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decide release target
        id: plan
        run: |
          set -euo pipefail
          EVENT_NAME="${{ github.event_name }}"
          REF="${{ github.ref }}"
          INPUT_CHANNEL="${{ github.event.inputs.channel || 'stable' }}"
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          SHOULD_SKIP=false
          RELEASE_CHANNEL=""
          RELEASE_TAG=""
          PACKAGE_VERSION=""
          IS_PRERELEASE=false

          normalize_version() { echo "${1#v}"; }
          next_version() { echo "${1}-next.${GITHUB_RUN_NUMBER}"; }

          if [[ "$EVENT_NAME" == "push" && "$REF" == refs/tags/v* ]]; then
            RELEASE_CHANNEL="stable"
            RELEASE_TAG="${REF#refs/tags/}"
            PACKAGE_VERSION="$(normalize_version "$RELEASE_TAG")"
          elif [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if [[ "$COMMIT_MSG" =~ ^chore:\ release ]] || [[ "$COMMIT_MSG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              SHOULD_SKIP=true
            else
              BASE_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
              PACKAGE_VERSION="$(next_version "$BASE_VERSION")"
              RELEASE_CHANNEL="next"
              RELEASE_TAG="v${PACKAGE_VERSION}"
              IS_PRERELEASE=true
            fi
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$INPUT_CHANNEL" == "stable" ]]; then
              [[ -z "$INPUT_VERSION" ]] && { echo "Stable requires version"; exit 1; }
              RELEASE_CHANNEL="stable"
              PACKAGE_VERSION="$(normalize_version "$INPUT_VERSION")"
              RELEASE_TAG="v${PACKAGE_VERSION}"
            else
              BASE_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
              PACKAGE_VERSION="${INPUT_VERSION:-$(next_version "$BASE_VERSION")}"
              RELEASE_CHANNEL="next"
              RELEASE_TAG="v${PACKAGE_VERSION}"
              IS_PRERELEASE=true
            fi
          else
            SHOULD_SKIP=true
          fi

          echo "should_skip=${SHOULD_SKIP}" >> "$GITHUB_OUTPUT"
          echo "release_channel=${RELEASE_CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "github_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.asset_name }}
    needs: [plan]
    if: needs.plan.outputs.should_skip != 'true'
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,      asset_name: linux-x86_64,        cross: false }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,     asset_name: linux-aarch64,       cross: true  }
          - { os: ubuntu-latest,  target: armv7-unknown-linux-gnueabihf, asset_name: linux-armv7,         cross: true  }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-musl,    asset_name: linux-aarch64-static, cross: true }
          - { os: macos-14,       target: aarch64-apple-darwin,          asset_name: macos-aarch64,       cross: false }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,       asset_name: windows-x86_64,      cross: false }
    steps:
      - uses: actions/checkout@v4

      - name: Sync version across Cargo.toml + package.json
        shell: bash
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          echo "Setting version to ${VERSION} in Cargo.toml and package.json"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml && rm -f Cargo.toml.bak
          node -e "const p=require('./package.json');p.version='${VERSION}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Cargo.toml: $(grep '^version' Cargo.toml)"
          echo "package.json: $(grep '\"version\"' package.json)"

      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          targets: ${{ matrix.target }}
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: rui314/setup-mold@v1
        if: matrix.target == 'x86_64-unknown-linux-gnu'

      - name: Regenerate lockfile after version sync
        run: cargo generate-lockfile

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}-${{ matrix.target }}
          cache-on-failure: "true"

      - name: Cross-compile tools
        if: matrix.cross && matrix.target != 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-musl'
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
        run: cargo build --locked --release --target ${{ matrix.target }} --bin red

      - name: Build (musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          docker run --rm -v "${PWD}:/volume" -w /volume messense/rust-musl-cross:aarch64-musl \
            bash -lc '
              rm -f rust-toolchain.toml
              curl -sSL https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-x86_64.zip -o /tmp/protoc.zip
              unzip -o /tmp/protoc.zip -d /usr/local >/dev/null
              cargo build --release --target aarch64-unknown-linux-musl --bin red
            '
          sudo chown -R "$(id -u):$(id -g)" target/aarch64-unknown-linux-musl

      - name: Strip (Linux native)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/red

      - name: Package asset
        shell: bash
        run: |
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          ASSET="red-${{ matrix.asset_name }}${EXT}"
          cp "target/${{ matrix.target }}/release/red${EXT}" "${ASSET}"
          shasum -a 256 "${ASSET}" > "${ASSET}.sha256" 2>/dev/null || certutil -hashfile "${ASSET}" SHA256 > "${ASSET}.sha256"

      - name: Smoke test
        if: "!matrix.cross"
        shell: bash
        run: |
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          ./"red-${{ matrix.asset_name }}${EXT}" version

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: red-${{ matrix.asset_name }}*
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  publish-github:
    name: GitHub Release
    needs: [plan, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: needs.plan.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.release_tag }}
          name: RedDB ${{ needs.plan.outputs.release_tag }}
          body: |
            # RedDB ${{ needs.plan.outputs.release_tag }}

            ## Install

            **npm / pnpm:**
            ```bash
            pnpm add reddb
            ```

            **Binary (Linux x86_64):**
            ```bash
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ needs.plan.outputs.release_tag }}/red-linux-x86_64 -o red && chmod +x red
            ```

            **Docker:**
            ```bash
            docker run --rm ghcr.io/${{ github.repository }}:${{ needs.plan.outputs.release_tag }} version
            ```
          prerelease: ${{ needs.plan.outputs.github_prerelease }}
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: [plan, publish-github]
    runs-on: ubuntu-latest
    if: needs.plan.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Set version
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ needs.plan.outputs.package_version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG=$([[ "${{ needs.plan.outputs.release_channel }}" == "next" ]] && echo "next" || echo "latest")
          npm publish --tag "${TAG}" --access public

  publish-cargo:
    name: Publish to crates.io
    needs: [plan, publish-github]
    runs-on: ubuntu-latest
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync Cargo.toml version
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          cargo generate-lockfile
          echo "Publishing reddb@${VERSION} to crates.io"
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty --token "${CARGO_REGISTRY_TOKEN}"

  publish-rust-client:
    name: Publish reddb-client to crates.io
    needs: [plan, publish-cargo]
    runs-on: ubuntu-latest
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync versions
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          # Engine Cargo.toml (matches the version just published by publish-cargo).
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          # Client crate Cargo.toml.
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" drivers/rust/Cargo.toml
          # Point the client at the engine version on crates.io, not the local path.
          # `cargo publish` already resolves `{ version = "…", path = "…" }` using the
          # version field, but we rewrite to drop the path entirely to be explicit.
          sed -i "s|reddb = { version = \"[^\"]*\", path = \"\.\./\.\.\", optional = true }|reddb = { version = \"${VERSION}\", optional = true }|" drivers/rust/Cargo.toml
          cargo generate-lockfile --manifest-path drivers/rust/Cargo.toml
          echo "Publishing reddb-client@${VERSION} to crates.io"
      - name: Wait for reddb index propagation
        run: |
          # Give the crates.io sparse index a moment to pick up the engine
          # version that publish-cargo just pushed. Without this, the client
          # publish can fail with "no matching package named `reddb` found".
          for i in 1 2 3 4 5; do
            if cargo search reddb --limit 1 | grep -q "^reddb = \"${{ needs.plan.outputs.package_version }}\""; then
              echo "reddb@${{ needs.plan.outputs.package_version }} visible on crates.io"
              exit 0
            fi
            echo "not yet visible, sleeping 30s ($i/5)"
            sleep 30
          done
          echo "warning: reddb not visible after 150s — attempting publish anyway"
      - name: Publish
        working-directory: drivers/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --allow-dirty --token "${CARGO_REGISTRY_TOKEN}"

  publish-js-driver:
    name: Publish reddb (npm)
    needs: [plan, publish-github]
    runs-on: ubuntu-latest
    if: needs.plan.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Sync version
        working-directory: drivers/js
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ needs.plan.outputs.package_version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cat package.json | grep '"version"'
      - name: Publish
        working-directory: drivers/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG=$([[ "${{ needs.plan.outputs.release_channel }}" == "next" ]] && echo "next" || echo "latest")
          # The postinstall script pulls the matching `red` binary from the
          # GitHub Release that `publish-github` just created.
          npm publish --tag "${TAG}" --access public

  publish-docker:
    name: Docker image (GHCR + Docker Hub)
    needs: [plan, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    if: needs.plan.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/forattini/reddb
          tags: |
            type=raw,value=${{ needs.plan.outputs.release_tag }}
            type=raw,value=latest,enable=${{ needs.plan.outputs.release_channel == 'stable' }}
            type=raw,value=next,enable=${{ needs.plan.outputs.release_channel == 'next' }}
          labels: |
            org.opencontainers.image.title=RedDB
            org.opencontainers.image.description=AI-first multi-model database
            org.opencontainers.image.version=${{ needs.plan.outputs.package_version }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # publish-python — Build and upload reddb wheels to PyPI.
  #
  # ⚠ DISABLED until the PYPI_API_TOKEN secret is created.
  #    See PLAN_DRIVERS.md Phase 4. To enable:
  #      1. Verify `reddb` is available on PyPI (or fall back to `reddb-client`
  #         in drivers/python/pyproject.toml).
  #      2. Create a PyPI account, generate a project-scoped API token.
  #      3. Add it as a repo secret named `PYPI_API_TOKEN`.
  #      4. Replace `if: false` below with the same conditional the other
  #         publish jobs use:
  #         if: needs.plan.outputs.should_skip != 'true'
  # ===========================================================================
  publish-python-wheels:
    name: Build PyPI wheel (${{ matrix.target }})
    needs: [plan, build]
    if: false  # TODO: enable after creating PYPI_API_TOKEN secret
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu,  manylinux: '2014' }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, manylinux: '2014' }
          - { os: macos-14,      target: aarch64-apple-darwin,      manylinux: 'auto' }
          - { os: macos-13,      target: x86_64-apple-darwin,       manylinux: 'auto' }
          - { os: windows-latest,target: x86_64-pc-windows-msvc,    manylinux: 'auto' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Sync version
        shell: bash
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          # drivers/python/pyproject.toml + Cargo.toml share the same version.
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" drivers/python/Cargo.toml drivers/python/pyproject.toml
          rm -f drivers/python/Cargo.toml.bak drivers/python/pyproject.toml.bak
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: drivers/python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: reddb-wheel-${{ matrix.target }}
          path: drivers/python/dist/*

  publish-python-upload:
    name: Upload wheels to PyPI
    needs: [plan, publish-python-wheels]
    if: false  # TODO: enable after creating PYPI_API_TOKEN secret
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: reddb-wheel-*
          merge-multiple: true
          path: dist
      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
