name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - next
      version:
        description: Optional version for stable (e.g. 0.1.2)
        required: false
      publish_cargo:
        description: Publish crates to crates.io from GitHub Actions
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: red

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      should_skip: ${{ steps.plan.outputs.should_skip }}
      release_channel: ${{ steps.plan.outputs.release_channel }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      package_version: ${{ steps.plan.outputs.package_version }}
      github_prerelease: ${{ steps.plan.outputs.github_prerelease }}
      publish_cargo: ${{ steps.plan.outputs.publish_cargo }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Decide release target
        id: plan
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          EVENT_NAME="${{ github.event_name }}"
          REF="${{ github.ref }}"
          INPUT_CHANNEL="${{ github.event.inputs.channel || 'stable' }}"
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          INPUT_PUBLISH_CARGO="${{ github.event.inputs.publish_cargo || 'false' }}"
          SHOULD_SKIP=false
          RELEASE_CHANNEL=""
          RELEASE_TAG=""
          PACKAGE_VERSION=""
          IS_PRERELEASE=false
          PUBLISH_CARGO=false

          normalize_version() { echo "${1#v}"; }
          next_version() { echo "${1}-next.${GITHUB_RUN_NUMBER}"; }

          if [[ "$EVENT_NAME" == "push" && "$REF" == refs/tags/v* ]]; then
            RELEASE_CHANNEL="stable"
            RELEASE_TAG="${REF#refs/tags/}"
            PACKAGE_VERSION="$(normalize_version "$RELEASE_TAG")"
            # Tag-driven stable releases always publish to crates.io. The
            # `workflow_dispatch` toggle below stays as the escape hatch for
            # re-running publish-cargo independently of a tag bump.
            PUBLISH_CARGO=true
          elif [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            COMMIT_MSG="${HEAD_COMMIT_MESSAGE}"
            if [[ "$COMMIT_MSG" =~ ^chore:\ release ]] || [[ "$COMMIT_MSG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              SHOULD_SKIP=true
            else
              BASE_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
              PACKAGE_VERSION="$(next_version "$BASE_VERSION")"
              RELEASE_CHANNEL="next"
              RELEASE_TAG="v${PACKAGE_VERSION}"
              IS_PRERELEASE=true
            fi
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$INPUT_CHANNEL" == "stable" ]]; then
              [[ -z "$INPUT_VERSION" ]] && { echo "Stable requires version"; exit 1; }
              RELEASE_CHANNEL="stable"
              PACKAGE_VERSION="$(normalize_version "$INPUT_VERSION")"
              RELEASE_TAG="v${PACKAGE_VERSION}"
            else
              BASE_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
              PACKAGE_VERSION="${INPUT_VERSION:-$(next_version "$BASE_VERSION")}"
              RELEASE_CHANNEL="next"
              RELEASE_TAG="v${PACKAGE_VERSION}"
              IS_PRERELEASE=true
            fi
            if [[ "$INPUT_PUBLISH_CARGO" == "true" ]]; then
              PUBLISH_CARGO=true
            fi
          else
            SHOULD_SKIP=true
          fi

          if [[ "$SHOULD_SKIP" != "true" && "$EVENT_NAME" == "push" && "$REF" == refs/tags/v* ]]; then
            MANIFEST_VERSION="$(node -p "require('./package.json').version")"
            if [[ "$MANIFEST_VERSION" != "$PACKAGE_VERSION" ]]; then
              echo "Tag ${RELEASE_TAG} resolves to ${PACKAGE_VERSION}, but package.json is ${MANIFEST_VERSION}."
              echo "Run pnpm version patch/minor/major, then git push --follow-tags."
              exit 1
            fi
          fi

          echo "should_skip=${SHOULD_SKIP}" >> "$GITHUB_OUTPUT"
          echo "release_channel=${RELEASE_CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "github_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "publish_cargo=${PUBLISH_CARGO}" >> "$GITHUB_OUTPUT"

      - name: Check workspace version consistency
        if: steps.plan.outputs.should_skip != 'true'
        run: bash scripts/check-versions.sh

  build:
    name: Build ${{ matrix.asset_name }}
    needs: [plan]
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: ${{ matrix.optional == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 / armv7: native compile on a Blacksmith 8-vCPU
          # x86_64 runner. The armv7 target still needs the cross-gcc
          # toolchain, but the underlying CPU is 2x faster than ubuntu-latest.
          - { os: blacksmith-8vcpu-ubuntu-2404, target: x86_64-unknown-linux-gnu,      asset_name: linux-x86_64,        cross: false }
          - { os: blacksmith-8vcpu-ubuntu-2404, target: armv7-unknown-linux-gnueabihf, asset_name: linux-armv7,         cross: true  }
          # Linux aarch64: build natively on a Blacksmith ARM runner instead
          # of cross-compiling from x86_64. Removes the gcc-aarch64-linux-gnu
          # cross toolchain install + linker env vars + the QEMU smoke test
          # for this target.
          - { os: blacksmith-8vcpu-ubuntu-2404-arm, target: aarch64-unknown-linux-gnu, asset_name: linux-aarch64, cross: false }
          # aarch64-musl keeps the Docker cross-compile path (musl
          # toolchain inside messense/rust-musl-cross) — still on a
          # Blacksmith x86_64 runner so the docker spawn is unchanged.
          - { os: blacksmith-8vcpu-ubuntu-2404, target: aarch64-unknown-linux-musl, asset_name: linux-aarch64-static, cross: true }
          # Build Intel macOS on the ARM macOS pool. The macos-13 Intel pool
          # frequently queues long enough to block publishing; cross-building
          # from macos-14 still produces the x86_64-apple-darwin asset, but we
          # cannot rely on Rosetta being available for a local smoke test.
          - { os: macos-14,       target: x86_64-apple-darwin,           asset_name: macos-x86_64,        cross: false, smoke: false, optional: true }
          - { os: macos-14,       target: aarch64-apple-darwin,          asset_name: macos-aarch64,       cross: false, optional: true }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, asset_name: windows-x86_64, cross: false, optional: true }
    steps:
      - uses: actions/checkout@v6

      - name: Sync release version
        shell: bash
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VERSION}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh

      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          targets: ${{ matrix.target }}
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: mozilla-actions/sccache-action@v0.0.10
        if: "!matrix.cross"
      - uses: rui314/setup-mold@v1
        if: matrix.target == 'x86_64-unknown-linux-gnu'

      - name: Regenerate lockfile after version sync
        run: cargo generate-lockfile

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}-${{ matrix.target }}
          cache-on-failure: "true"

      - name: Add cross-compile target
        if: matrix.cross
        run: rustup target add ${{ matrix.target }}

      - name: Cross-compile tools
        # Only `armv7` and the musl-via-docker target need apt-installed
        # cross toolchains now. aarch64 builds natively on blacksmith-arm64.
        if: matrix.target == 'armv7-unknown-linux-gnueabihf'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-musl'
        shell: bash
        env:
          SCCACHE_GHA_ENABLED: ${{ !matrix.cross && 'true' || '' }}
          RUSTC_WRAPPER: ${{ !matrix.cross && 'sccache' || '' }}
          # Cross-compile linker/CC overrides only apply when matrix.cross
          # is true. aarch64-unknown-linux-gnu now builds natively on
          # blacksmith-arm64, so the host gcc is the right answer for
          # that target — setting `aarch64-linux-gnu-gcc` here would point
          # cargo at a binary that isn't installed on the arm64 runner.
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: ${{ matrix.target == 'armv7-unknown-linux-gnueabihf' && 'arm-linux-gnueabihf-gcc' || '' }}
          CC_armv7_unknown_linux_gnueabihf: ${{ matrix.target == 'armv7-unknown-linux-gnueabihf' && 'arm-linux-gnueabihf-gcc' || '' }}
          CXX_armv7_unknown_linux_gnueabihf: ${{ matrix.target == 'armv7-unknown-linux-gnueabihf' && 'arm-linux-gnueabihf-g++' || '' }}
          AR_armv7_unknown_linux_gnueabihf: ${{ matrix.target == 'armv7-unknown-linux-gnueabihf' && 'arm-linux-gnueabihf-ar' || '' }}
        run: |
          cargo build --locked --release --target ${{ matrix.target }} --bin red
          cargo build --locked --release --target ${{ matrix.target }} --bin red_client -p reddb-io-client --no-default-features

      - name: Build (musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          docker run --rm -v "${PWD}:/volume" -w /volume messense/rust-musl-cross:aarch64-musl \
            bash -lc '
              rm -f rust-toolchain.toml
              curl -sSL https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-x86_64.zip -o /tmp/protoc.zip
              unzip -o /tmp/protoc.zip -d /usr/local >/dev/null
              cargo build --release --target aarch64-unknown-linux-musl --bin red
              cargo build --release --target aarch64-unknown-linux-musl --bin red_client -p reddb-io-client --no-default-features
            '
          sudo chown -R "$(id -u):$(id -g)" target/aarch64-unknown-linux-musl

      - name: Strip (Linux native)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          strip target/${{ matrix.target }}/release/red
          strip target/${{ matrix.target }}/release/red_client

      - name: Package assets
        shell: bash
        run: |
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          for BIN in red red_client; do
            ASSET="${BIN}-${{ matrix.asset_name }}${EXT}"
            cp "target/${{ matrix.target }}/release/${BIN}${EXT}" "${ASSET}"
            shasum -a 256 "${ASSET}" > "${ASSET}.sha256" 2>/dev/null || certutil -hashfile "${ASSET}" SHA256 > "${ASSET}.sha256"
          done

      - name: Smoke test
        if: "!matrix.cross && matrix.smoke != false"
        shell: bash
        run: |
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          ./"red-${{ matrix.asset_name }}${EXT}" version
          # red_client without a URI must exit 1 (usage error).
          set +e
          ./"red_client-${{ matrix.asset_name }}${EXT}"
          rc=$?
          set -e
          if [ "$rc" != "1" ]; then
            echo "red_client smoke: expected exit 1 (no URI), got $rc"
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: |
            red-${{ matrix.asset_name }}*
            red_client-${{ matrix.asset_name }}*
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  artifact-sizes:
    # PLAN.md B2 — gate release on measured static binary and image size.
    name: Artifact Size Gate
    needs: [plan]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - name: Sync release version
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VERSION}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-artifact-size-rust-1.91.0
          cache-on-failure: "true"
      - name: Measure binary and image size
        run: make artifact-size
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: artifact-sizes
          path: bench/artifact-sizes.md

  publish-github:
    name: GitHub Release
    needs: [plan, build, artifact-sizes]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.plan.outputs.release_tag }}
          name: RedDB ${{ needs.plan.outputs.release_tag }}
          body: |
            # RedDB ${{ needs.plan.outputs.release_tag }}

            ## Install

            **npm / pnpm:**
            ```bash
            pnpm add @reddb-io/cli    # CLI launcher (`red` binary wrapper)
            pnpm add @reddb-io/sdk    # Node/TS driver package (native protocol + spawn)
            pnpm add @reddb-io/client # Thin remote-only client
            ```

            **Binaries (Linux x86_64):**
            ```bash
            # Full server + embedded engine
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ needs.plan.outputs.release_tag }}/red-linux-x86_64 -o red && chmod +x red
            # Thin remote-only client (~2 MB)
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ needs.plan.outputs.release_tag }}/red_client-linux-x86_64 -o red_client && chmod +x red_client
            ```

            **Docker:**
            ```bash
            docker run --rm ghcr.io/${{ github.repository }}:${{ needs.plan.outputs.release_tag }} version
            ```

            **Or via Docker (thin client, ~7 MB):**
            ```bash
            docker run --rm ghcr.io/${{ github.repository }}-client:${{ needs.plan.outputs.release_tag }} red://reddb.example.com:5050 -c "SELECT 1"
            ```
          prerelease: ${{ needs.plan.outputs.github_prerelease }}
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}

  verify-release-assets:
    # Gate every npm publish on the GitHub Release carrying the binary
    # assets the SDK postinstall expects. Closes #418 — 1.0.5 shipped to
    # npm without `red-linux-x86_64`, which broke every Linux x86_64
    # postinstall with a 404 until users discovered `REDDB_BIN`. The
    # `needs: [build]` chain on `publish-github` was supposed to make
    # this impossible (matrix failure blocks the release), but defense
    # in depth: explicitly check the assets are listed on the Release
    # before any npm tarball ships.
    name: Verify release assets
    needs: [plan, publish-github]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - name: Assert every postinstall-required asset is published
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.plan.outputs.release_tag }}
        run: bash scripts/verify-release-assets.sh "$RELEASE_TAG"

  publish-npm:
    name: Publish CLI npm package
    needs: [plan, publish-github, verify-release-assets]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable
      - name: Sync release version
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VERSION}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "::warning::NPM_TOKEN secret not set — skipping. Add an Automation token from npmjs.com as NPM_TOKEN in repo secrets."
            exit 0
          fi
          TAG=$([[ "${{ needs.plan.outputs.release_channel }}" == "next" ]] && echo "next" || echo "latest")
          pnpm publish --tag "${TAG}" --access public --no-git-checks

  publish-cargo:
    name: Publish crates to crates.io
    # Only depends on `plan`. Source publishing doesn't need binaries from
    # the `build` matrix, so let it run in parallel with everything else.
    # Previously gated behind `publish-github` which forced a ~15-20 min
    # serial wait on the build matrix.
    needs: [plan]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable' &&
      needs.plan.outputs.publish_cargo == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Sync release version
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VERSION}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh
      - name: Publish workspace crates
        env:
          # cargo reads CARGO_REGISTRY_TOKEN from the environment directly,
          # no need for the deprecated `--token` flag.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.plan.outputs.package_version }}"
          # Cargo's own publish flow handles the "wait for dependency
          # to appear in the index" dance. The hand-rolled `cargo search`
          # poll loop we used to run before each `cargo publish` consumed
          # ~150s per crate and always timed out (crates.io search index
          # is lazy). Removed — the 5-10s of `cargo publish` itself is
          # usually enough; if a downstream crate publish fails because
          # its parent isn't in the index yet, the step exits non-zero
          # and CI shows that signal clearly instead of marching on.
          publish_one() {
            local crate="$1"
            echo "==> publish ${crate}@${VERSION}"
            cargo publish --locked -p "$crate"
          }

          publish_one reddb-io-wire
          publish_one reddb-io-grpc-proto
          publish_one reddb-io-client-connector
          publish_one reddb-io-server
          publish_one reddb-io-client
          publish_one reddb-io

  publish-js-driver:
    name: Publish @reddb-io/sdk (npm)
    needs: [plan, publish-github, verify-release-assets]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable
      - name: Sync release version
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VERSION}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh
      - name: Verify pack
        working-directory: drivers/js
        run: pnpm pack --pack-destination "$RUNNER_TEMP"
      - name: Publish
        working-directory: drivers/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "::warning::NPM_TOKEN secret not set — skipping. Add an Automation token from npmjs.com as NPM_TOKEN in repo secrets."
            exit 0
          fi
          TAG=$([[ "${{ needs.plan.outputs.release_channel }}" == "next" ]] && echo "next" || echo "latest")
          pnpm publish --tag "${TAG}" --access public --no-git-checks

  publish-js-client:
    name: Publish @reddb-io/client (npm)
    needs: [plan, publish-github, verify-release-assets]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable
      - name: Sync release version
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VERSION}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh
      - name: Verify pack
        working-directory: drivers/js-client
        run: pnpm pack --pack-destination "$RUNNER_TEMP"
      - name: Publish
        working-directory: drivers/js-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "::warning::NPM_TOKEN secret not set — skipping. Add an Automation token from npmjs.com as NPM_TOKEN in repo secrets."
            exit 0
          fi
          TAG=$([[ "${{ needs.plan.outputs.release_channel }}" == "next" ]] && echo "next" || echo "latest")
          pnpm publish --tag "${TAG}" --access public --no-git-checks

  publish-bun-client:
    name: Publish @reddb-io/client-bun (npm)
    needs: [plan, publish-github, verify-release-assets]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable
      - name: Sync release version
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VERSION}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh
      - name: Verify pack
        working-directory: drivers/bun
        run: pnpm pack --pack-destination "$RUNNER_TEMP"
      - name: Publish
        working-directory: drivers/bun
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN}" ]]; then
            echo "::warning::NPM_TOKEN secret not set — skipping. Add an Automation token from npmjs.com as NPM_TOKEN in repo secrets."
            exit 0
          fi
          TAG=$([[ "${{ needs.plan.outputs.release_channel }}" == "next" ]] && echo "next" || echo "latest")
          pnpm publish --tag "${TAG}" --access public --no-git-checks

  publish-docker:
    name: Docker image (GHCR)
    needs: [plan, build]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    if: needs.plan.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: linux-x86_64
          path: release/linux-x86_64
      - uses: actions/download-artifact@v8
        with:
          name: linux-aarch64
          path: release/linux-aarch64
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Sync release version
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VERSION}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh

      - name: Prepare release binaries for Docker
        run: |
          set -euo pipefail
          mkdir -p docker-bin/amd64 docker-bin/arm64
          cp release/linux-x86_64/red-linux-x86_64 docker-bin/amd64/red
          cp release/linux-aarch64/red-linux-aarch64 docker-bin/arm64/red
          chmod 755 docker-bin/amd64/red docker-bin/arm64/red

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.plan.outputs.release_tag }}
            type=raw,value=${{ needs.plan.outputs.package_version }}
            type=raw,value=latest,enable=${{ needs.plan.outputs.release_channel == 'stable' }}
            type=raw,value=next,enable=${{ needs.plan.outputs.release_channel == 'next' }}
          labels: |
            org.opencontainers.image.title=RedDB
            org.opencontainers.image.description=AI-first multi-model database
            org.opencontainers.image.version=${{ needs.plan.outputs.package_version }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.release
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-client-image:
    # ADR 0004 — thin red_client container, parallel to publish-docker.
    # Built from the release matrix artifact so Docker publishing does not
    # recompile Rust inside the container.
    # Pushed to GHCR under reddb-io; Docker Hub mirroring is intentionally off.
    name: Docker image — red_client (GHCR)
    needs: [plan, build]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    if: needs.plan.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: linux-x86_64
          path: release/linux-x86_64
      - uses: actions/download-artifact@v8
        with:
          name: linux-aarch64
          path: release/linux-aarch64
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Sync release version
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VERSION}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh

      - name: Prepare release binaries for Docker
        run: |
          set -euo pipefail
          mkdir -p docker-bin/amd64 docker-bin/arm64
          cp release/linux-x86_64/red_client-linux-x86_64 docker-bin/amd64/red_client
          cp release/linux-aarch64/red_client-linux-aarch64 docker-bin/arm64/red_client
          chmod 755 docker-bin/amd64/red_client docker-bin/arm64/red_client

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}-client
          tags: |
            type=raw,value=${{ needs.plan.outputs.release_tag }}
            type=raw,value=${{ needs.plan.outputs.package_version }}
            type=raw,value=latest,enable=${{ needs.plan.outputs.release_channel == 'stable' }}
            type=raw,value=next,enable=${{ needs.plan.outputs.release_channel == 'next' }}
          labels: |
            org.opencontainers.image.title=RedDB thin client
            org.opencontainers.image.description=Minimal `red_client` binary on distroless/cc
            org.opencontainers.image.version=${{ needs.plan.outputs.package_version }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.client.release
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false

  # ===========================================================================
  # publish-python — Build and upload reddb wheels to PyPI.
  #
  # ⚠ DISABLED until the PYPI_API_TOKEN secret is created.
  #    See PLAN_DRIVERS.md Phase 4. To enable:
  #      1. Verify `reddb` is available on PyPI (or fall back to `reddb-client`
  #         in drivers/python/pyproject.toml).
  #      2. Create a PyPI account, generate a project-scoped API token.
  #      3. Add it as a repo secret named `PYPI_API_TOKEN`.
  #      4. Replace `if: false` below with the same conditional the other
  #         publish jobs use:
  #         if: needs.plan.outputs.should_skip != 'true'
  # ===========================================================================
  publish-python-wheels:
    name: Build PyPI wheel (${{ matrix.target }})
    needs: [plan, build]
    if: false  # TODO: enable after creating PYPI_API_TOKEN secret
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu,  manylinux: '2014' }
          - { os: ubuntu-latest, target: blacksmith-4vcpu-ubuntu-2404-arm, manylinux: '2014' }
          - { os: macos-14,      target: aarch64-apple-darwin,      manylinux: 'auto' }
          - { os: macos-13,      target: x86_64-apple-darwin,       manylinux: 'auto' }
          - { os: windows-latest,target: x86_64-pc-windows-msvc,    manylinux: 'auto' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Sync release version
        shell: bash
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          node -e "const fs=require('fs');const p=require('./package.json');p.version='${VERSION}';fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: drivers/python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: reddb-wheel-${{ matrix.target }}
          path: drivers/python/dist/*

  publish-python-upload:
    name: Upload wheels to PyPI
    needs: [plan, publish-python-wheels]
    if: false  # TODO: enable after creating PYPI_API_TOKEN secret
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: reddb-wheel-*
          merge-multiple: true
          path: dist
      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
