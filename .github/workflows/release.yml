name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel
        required: true
        default: stable
        type: choice
        options:
          - stable
          - next
      version:
        description: Optional version for stable (e.g. 0.1.2)
        required: false
      publish_cargo:
        description: Publish crates to crates.io from GitHub Actions
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: red

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: Plan release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      should_skip: ${{ steps.plan.outputs.should_skip }}
      release_channel: ${{ steps.plan.outputs.release_channel }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      package_version: ${{ steps.plan.outputs.package_version }}
      github_prerelease: ${{ steps.plan.outputs.github_prerelease }}
      publish_cargo: ${{ steps.plan.outputs.publish_cargo }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Decide release target
        id: plan
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          EVENT_NAME="${{ github.event_name }}"
          REF="${{ github.ref }}"
          INPUT_CHANNEL="${{ github.event.inputs.channel || 'stable' }}"
          INPUT_VERSION="${{ github.event.inputs.version || '' }}"
          INPUT_PUBLISH_CARGO="${{ github.event.inputs.publish_cargo || 'false' }}"
          SHOULD_SKIP=false
          RELEASE_CHANNEL=""
          RELEASE_TAG=""
          PACKAGE_VERSION=""
          IS_PRERELEASE=false
          PUBLISH_CARGO=false

          normalize_version() { echo "${1#v}"; }
          next_version() { echo "${1}-next.${GITHUB_RUN_NUMBER}"; }

          if [[ "$EVENT_NAME" == "push" && "$REF" == refs/tags/v* ]]; then
            RELEASE_CHANNEL="stable"
            RELEASE_TAG="${REF#refs/tags/}"
            PACKAGE_VERSION="$(normalize_version "$RELEASE_TAG")"
          elif [[ "$EVENT_NAME" == "push" && "$REF" == "refs/heads/main" ]]; then
            COMMIT_MSG="${HEAD_COMMIT_MESSAGE}"
            if [[ "$COMMIT_MSG" =~ ^chore:\ release ]] || [[ "$COMMIT_MSG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              SHOULD_SKIP=true
            else
              BASE_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
              PACKAGE_VERSION="$(next_version "$BASE_VERSION")"
              RELEASE_CHANNEL="next"
              RELEASE_TAG="v${PACKAGE_VERSION}"
              IS_PRERELEASE=true
            fi
          elif [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$INPUT_CHANNEL" == "stable" ]]; then
              [[ -z "$INPUT_VERSION" ]] && { echo "Stable requires version"; exit 1; }
              RELEASE_CHANNEL="stable"
              PACKAGE_VERSION="$(normalize_version "$INPUT_VERSION")"
              RELEASE_TAG="v${PACKAGE_VERSION}"
            else
              BASE_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
              PACKAGE_VERSION="${INPUT_VERSION:-$(next_version "$BASE_VERSION")}"
              RELEASE_CHANNEL="next"
              RELEASE_TAG="v${PACKAGE_VERSION}"
              IS_PRERELEASE=true
            fi
            if [[ "$INPUT_PUBLISH_CARGO" == "true" ]]; then
              PUBLISH_CARGO=true
            fi
          else
            SHOULD_SKIP=true
          fi

          echo "should_skip=${SHOULD_SKIP}" >> "$GITHUB_OUTPUT"
          echo "release_channel=${RELEASE_CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "github_prerelease=${IS_PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "publish_cargo=${PUBLISH_CARGO}" >> "$GITHUB_OUTPUT"

      - name: Check workspace version consistency
        if: steps.plan.outputs.should_skip != 'true'
        run: bash scripts/check-versions.sh

  build:
    name: Build ${{ matrix.asset_name }}
    needs: [plan]
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    runs-on: ${{ matrix.os }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,      asset_name: linux-x86_64,        cross: false }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu,     asset_name: linux-aarch64,       cross: true  }
          - { os: ubuntu-latest,  target: armv7-unknown-linux-gnueabihf, asset_name: linux-armv7,         cross: true  }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-musl,    asset_name: linux-aarch64-static, cross: true }
          - { os: macos-14,       target: aarch64-apple-darwin,          asset_name: macos-aarch64,       cross: false }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,       asset_name: windows-x86_64,      cross: false }
    steps:
      - uses: actions/checkout@v6

      - name: Sync version across Cargo.toml + package.json
        shell: bash
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          echo "Setting version to ${VERSION} in Cargo.toml and package.json"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml && rm -f Cargo.toml.bak
          node -e "const p=require('./package.json');p.version='${VERSION}';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          echo "Cargo.toml: $(grep '^version' Cargo.toml)"
          echo "package.json: $(grep '\"version\"' package.json)"

      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          targets: ${{ matrix.target }}
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: rui314/setup-mold@v1
        if: matrix.target == 'x86_64-unknown-linux-gnu'

      - name: Regenerate lockfile after version sync
        run: cargo generate-lockfile

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}-${{ matrix.target }}
          cache-on-failure: "true"

      - name: Cross-compile tools
        if: matrix.cross && matrix.target != 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf

      - name: Build
        if: matrix.target != 'aarch64-unknown-linux-musl'
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CC_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-gcc
          CXX_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-g++
          AR_armv7_unknown_linux_gnueabihf: arm-linux-gnueabihf-ar
        run: |
          cargo build --locked --release --target ${{ matrix.target }} --bin red
          cargo build --locked --release --target ${{ matrix.target }} --bin red_client -p reddb-client --no-default-features

      - name: Build (musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          docker run --rm -v "${PWD}:/volume" -w /volume messense/rust-musl-cross:aarch64-musl \
            bash -lc '
              rm -f rust-toolchain.toml
              curl -sSL https://github.com/protocolbuffers/protobuf/releases/download/v28.3/protoc-28.3-linux-x86_64.zip -o /tmp/protoc.zip
              unzip -o /tmp/protoc.zip -d /usr/local >/dev/null
              cargo build --release --target aarch64-unknown-linux-musl --bin red
              cargo build --release --target aarch64-unknown-linux-musl --bin red_client -p reddb-client --no-default-features
            '
          sudo chown -R "$(id -u):$(id -g)" target/aarch64-unknown-linux-musl

      - name: Strip (Linux native)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          strip target/${{ matrix.target }}/release/red
          strip target/${{ matrix.target }}/release/red_client

      - name: Package assets
        shell: bash
        run: |
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          for BIN in red red_client; do
            ASSET="${BIN}-${{ matrix.asset_name }}${EXT}"
            cp "target/${{ matrix.target }}/release/${BIN}${EXT}" "${ASSET}"
            shasum -a 256 "${ASSET}" > "${ASSET}.sha256" 2>/dev/null || certutil -hashfile "${ASSET}" SHA256 > "${ASSET}.sha256"
          done

      - name: Smoke test
        if: "!matrix.cross"
        shell: bash
        run: |
          EXT=""; [[ "${{ matrix.target }}" == *windows* ]] && EXT=".exe"
          ./"red-${{ matrix.asset_name }}${EXT}" version
          # red_client without a URI must exit 1 (usage error).
          set +e
          ./"red_client-${{ matrix.asset_name }}${EXT}"
          rc=$?
          set -e
          if [ "$rc" != "1" ]; then
            echo "red_client smoke: expected exit 1 (no URI), got $rc"
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: |
            red-${{ matrix.asset_name }}*
            red_client-${{ matrix.asset_name }}*
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  artifact-sizes:
    # PLAN.md B2 — gate release on measured static binary and image size.
    name: Artifact Size Gate
    needs: [plan]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-artifact-size-rust-1.91.0
          cache-on-failure: "true"
      - name: Measure binary and image size
        run: make artifact-size
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: artifact-sizes
          path: bench/artifact-sizes.md

  publish-github:
    name: GitHub Release
    needs: [plan, build, artifact-sizes]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.plan.outputs.release_tag }}
          name: RedDB ${{ needs.plan.outputs.release_tag }}
          body: |
            # RedDB ${{ needs.plan.outputs.release_tag }}

            ## Install

            **npm / pnpm:**
            ```bash
            pnpm add @reddb-io/cli    # CLI launcher (`red` binary wrapper)
            pnpm add @reddb-io/sdk    # Node/TS driver package (native protocol + spawn)
            pnpm add @reddb-io/client # Thin remote-only client
            ```

            **Binaries (Linux x86_64):**
            ```bash
            # Full server + embedded engine
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ needs.plan.outputs.release_tag }}/red-linux-x86_64 -o red && chmod +x red
            # Thin remote-only client (~2 MB)
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ needs.plan.outputs.release_tag }}/red_client-linux-x86_64 -o red_client && chmod +x red_client
            ```

            **Docker:**
            ```bash
            docker run --rm ghcr.io/${{ github.repository }}:${{ needs.plan.outputs.release_tag }} version
            ```

            **Or via Docker (thin client, ~7 MB):**
            ```bash
            docker run --rm ghcr.io/${{ github.repository }}-client:${{ needs.plan.outputs.release_tag }} red://reddb.example.com:5050 -c "SELECT 1"
            ```
          prerelease: ${{ needs.plan.outputs.github_prerelease }}
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish CLI npm package
    needs: [plan, publish-github, publish-js-internals]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable
      - name: Set version
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ needs.plan.outputs.package_version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG=$([[ "${{ needs.plan.outputs.release_channel }}" == "next" ]] && echo "next" || echo "latest")
          pnpm publish --tag "${TAG}" --access public --no-git-checks

  publish-js-internals:
    name: Publish @reddb-io/internal-* support packages (npm)
    needs: [plan]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable
      - name: Sync versions
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          for dir in packages/internal-asset-fetcher packages/internal-bin-resolver packages/internal-version-compare; do
            node -e "
              const fs = require('fs');
              const file = '${dir}/package.json';
              const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
              pkg.version = '${VERSION}';
              pkg.private = false;
              fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n');
            "
          done
      - name: Verify packs
        run: |
          for dir in packages/internal-asset-fetcher packages/internal-bin-resolver packages/internal-version-compare; do
            (cd "$dir" && pnpm pack --pack-destination "$RUNNER_TEMP")
          done
      - name: Publish support packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG=$([[ "${{ needs.plan.outputs.release_channel }}" == "next" ]] && echo "next" || echo "latest")
          for dir in packages/internal-asset-fetcher packages/internal-bin-resolver packages/internal-version-compare; do
            (cd "$dir" && pnpm publish --tag "${TAG}" --access public --no-git-checks)
          done

  publish-cargo:
    name: Publish crates to crates.io
    needs: [plan, publish-github]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable' &&
      needs.plan.outputs.publish_cargo == 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync Cargo.toml + Cargo.lock version
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          for manifest in \
            Cargo.toml \
            crates/reddb-wire/Cargo.toml \
            crates/reddb-grpc-proto/Cargo.toml \
            crates/reddb-client-connector/Cargo.toml \
            crates/reddb-server/Cargo.toml \
            crates/reddb-client/Cargo.toml
          do
            sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" "$manifest"
          done
          cargo generate-lockfile
      - name: Publish workspace crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ needs.plan.outputs.package_version }}"
          publish_one() {
            local crate="$1"
            echo "==> dry-run ${crate}@${VERSION}"
            cargo publish --dry-run --locked -p "$crate"
            echo "==> publish ${crate}@${VERSION}"
            cargo publish --locked -p "$crate" --token "${CARGO_REGISTRY_TOKEN}"
            echo "==> wait for ${crate}@${VERSION} in crates.io index"
            for i in 1 2 3 4 5; do
              if cargo search "$crate" --limit 5 | grep -q "^${crate} = \"${VERSION}\""; then
                echo "${crate}@${VERSION} visible on crates.io"
                return 0
              fi
              echo "not yet visible, sleeping 30s ($i/5)"
              sleep 30
            done
            echo "warning: ${crate}@${VERSION} not visible after 150s; continuing"
          }

          publish_one reddb-wire
          publish_one reddb-grpc-proto
          publish_one reddb-client-connector
          publish_one reddb-server
          publish_one reddb-client
          echo "==> dry-run reddb@${VERSION}"
          cargo publish --dry-run --locked -p reddb
          echo "==> publish reddb@${VERSION}"
          cargo publish --locked -p reddb --token "${CARGO_REGISTRY_TOKEN}"

  publish-js-driver:
    name: Publish @reddb-io/sdk (npm)
    needs: [plan, publish-github, publish-js-internals]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: |
      needs.plan.outputs.should_skip != 'true' &&
      needs.plan.outputs.release_channel == 'stable'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable
      - name: Sync version
        working-directory: drivers/js
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ needs.plan.outputs.package_version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cat package.json | grep '"version"'
      - name: Verify pack
        working-directory: drivers/js
        run: pnpm pack --pack-destination "$RUNNER_TEMP"
      - name: Publish
        working-directory: drivers/js
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG=$([[ "${{ needs.plan.outputs.release_channel }}" == "next" ]] && echo "next" || echo "latest")
          # `--access public` is mandatory for first-publish of a scoped
          # package — npm defaults scoped packages to private and rejects
          # the publish with a 402/404 otherwise. The previous unscoped
          # `reddb` name was squatted on the public registry, which is
          # why every prior run silently 404'd.
          # The postinstall script pulls the matching `red` binary from
          # the GitHub Release that `publish-github` just created.
          pnpm publish --tag "${TAG}" --access public --no-git-checks

  publish-js-client:
    name: Publish @reddb-io/client (npm)
    needs: [plan, publish-github, publish-js-internals]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: needs.plan.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable
      - name: Sync version
        working-directory: drivers/js-client
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${{ needs.plan.outputs.package_version }}';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          cat package.json | grep '"version"'
      - name: Verify pack
        # Preflight per #128 retro: `npm pack --dry-run` fails fast on
        # regressions like the `reddb` 404 root cause (unscoped name
        # squatted on the registry). Catches missing files, bad paths,
        # or postinstall script issues before we hit the publish step.
        working-directory: drivers/js-client
        run: pnpm pack --pack-destination "$RUNNER_TEMP"
      - name: Publish
        working-directory: drivers/js-client
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          TAG=$([[ "${{ needs.plan.outputs.release_channel }}" == "next" ]] && echo "next" || echo "latest")
          # `--access public` is mandatory for first-publish of a scoped
          # package — npm defaults scoped packages to private and rejects
          # the publish with a 402/404 otherwise. See publish-js-driver
          # for the full retro from #128.
          pnpm publish --tag "${TAG}" --access public --no-git-checks

  publish-docker:
    name: Docker image (GHCR)
    needs: [plan, build]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    if: needs.plan.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.plan.outputs.release_tag }}
            type=raw,value=latest,enable=${{ needs.plan.outputs.release_channel == 'stable' }}
            type=raw,value=next,enable=${{ needs.plan.outputs.release_channel == 'next' }}
          labels: |
            org.opencontainers.image.title=RedDB
            org.opencontainers.image.description=AI-first multi-model database
            org.opencontainers.image.version=${{ needs.plan.outputs.package_version }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-client-image:
    # ADR 0004 — thin red_client container, parallel to publish-docker.
    # Built from Dockerfile.client (fully-static musl + distroless/static).
    # Pushed to GHCR under reddb-io; Docker Hub mirroring is intentionally off.
    name: Docker image — red_client (GHCR)
    needs: [plan, build]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      packages: write
    if: needs.plan.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            ghcr.io/${{ github.repository }}-client
          tags: |
            type=raw,value=${{ needs.plan.outputs.release_tag }}
            type=raw,value=latest,enable=${{ needs.plan.outputs.release_channel == 'stable' }}
            type=raw,value=next,enable=${{ needs.plan.outputs.release_channel == 'next' }}
          labels: |
            org.opencontainers.image.title=RedDB thin client
            org.opencontainers.image.description=Minimal `red_client` binary on distroless/static
            org.opencontainers.image.version=${{ needs.plan.outputs.package_version }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.client
          push: true
          # Only linux/amd64 for now — Dockerfile.client uses
          # messense/rust-musl-cross:x86_64-musl, which is single-arch.
          # Adding linux/arm64 needs a parallel job with the aarch64
          # variant of rust-musl-cross; defer to a follow-up.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=client
          cache-to: type=gha,mode=max,scope=client

  # ===========================================================================
  # publish-python — Build and upload reddb wheels to PyPI.
  #
  # ⚠ DISABLED until the PYPI_API_TOKEN secret is created.
  #    See PLAN_DRIVERS.md Phase 4. To enable:
  #      1. Verify `reddb` is available on PyPI (or fall back to `reddb-client`
  #         in drivers/python/pyproject.toml).
  #      2. Create a PyPI account, generate a project-scoped API token.
  #      3. Add it as a repo secret named `PYPI_API_TOKEN`.
  #      4. Replace `if: false` below with the same conditional the other
  #         publish jobs use:
  #         if: needs.plan.outputs.should_skip != 'true'
  # ===========================================================================
  publish-python-wheels:
    name: Build PyPI wheel (${{ matrix.target }})
    needs: [plan, build]
    if: false  # TODO: enable after creating PYPI_API_TOKEN secret
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu,  manylinux: '2014' }
          - { os: ubuntu-latest, target: blacksmith-4vcpu-ubuntu-2404-arm, manylinux: '2014' }
          - { os: macos-14,      target: aarch64-apple-darwin,      manylinux: 'auto' }
          - { os: macos-13,      target: x86_64-apple-darwin,       manylinux: 'auto' }
          - { os: windows-latest,target: x86_64-pc-windows-msvc,    manylinux: 'auto' }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Sync version
        shell: bash
        run: |
          VERSION="${{ needs.plan.outputs.package_version }}"
          # drivers/python/pyproject.toml + Cargo.toml share the same version.
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" drivers/python/Cargo.toml drivers/python/pyproject.toml
          rm -f drivers/python/Cargo.toml.bak drivers/python/pyproject.toml.bak
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: drivers/python
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: reddb-wheel-${{ matrix.target }}
          path: drivers/python/dist/*

  publish-python-upload:
    name: Upload wheels to PyPI
    needs: [plan, publish-python-wheels]
    if: false  # TODO: enable after creating PYPI_API_TOKEN secret
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: reddb-wheel-*
          merge-multiple: true
          path: dist
      - uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing dist/*
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
