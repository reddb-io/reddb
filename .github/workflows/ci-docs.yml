  chaos:
    name: Chaos & Drill Suite
    runs-on: ubuntu-latest
    steps:
      - run: echo "docs-only — chaos/drill unaffected"

  fuzz-parsers:
    name: Fuzz Parsers
    runs-on: ubuntu-latest
    steps:
