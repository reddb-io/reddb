name: Release Candidate

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG**'
      - 'LICENSE**'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

# New pushes to main cancel the in-flight RC — only the latest commit matters.
concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: Plan
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.actor != 'dependabot[bot]'
    outputs:
      should_skip: ${{ steps.plan.outputs.should_skip }}
      rc_version: ${{ steps.plan.outputs.rc_version }}
      rc_tag: ${{ steps.plan.outputs.rc_tag }}
    steps:
      - uses: actions/checkout@v7
      - name: Compute release candidate version
        id: plan
        env:
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          COMMIT_MSG="${HEAD_COMMIT_MESSAGE:-}"
          SHOULD_SKIP=false

          # Skip release-bot commits and explicit [skip rc] marker.
          if [[ "$COMMIT_MSG" =~ ^chore:\ release ]] \
            || [[ "$COMMIT_MSG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]] \
            || [[ "$COMMIT_MSG" == *"[skip rc]"* ]]; then
            SHOULD_SKIP=true
          fi

          BASE_VERSION=$(awk -F'"' '/^version = / {print $2; exit}' Cargo.toml)
          RC_VERSION="${BASE_VERSION}-rc.${GITHUB_RUN_NUMBER}"
          RC_TAG="v${RC_VERSION}"

          echo "should_skip=${SHOULD_SKIP}" >> "$GITHUB_OUTPUT"
          echo "rc_version=${RC_VERSION}" >> "$GITHUB_OUTPUT"
          echo "rc_tag=${RC_TAG}" >> "$GITHUB_OUTPUT"

  build-linux:
    name: Build Linux x86_64
    needs: [plan]
    if: needs.plan.outputs.should_skip != 'true'
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: rui314/setup-mold@v1
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Sync RC version across all manifests
        run: |
          RC_VERSION="${{ needs.plan.outputs.rc_version }}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${RC_VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh

      - name: Patch workspace dep version requirements for RC
        # Cargo does not match pre-release versions against range requirements like "^1.0".
        # Pin every internal workspace dep to the exact RC version so generate-lockfile resolves.
        run: |
          RC_VERSION="${{ needs.plan.outputs.rc_version }}"
          sed -i -E "s/(package = \"reddb-io-[^\"]+\", version = \")[^\"]+(\")/\1=${RC_VERSION}\2/" Cargo.toml

      - name: Regenerate lockfile after version sync
        run: cargo generate-lockfile

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: rc-linux-x86_64
          cache-on-failure: "true"

      - name: Build (release-fast)
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: sccache
        run: |
          cargo build --profile release-fast --bin red
          cargo build --profile release-fast --bin red_client -p reddb-io-client --no-default-features

      - name: Strip
        run: |
          strip target/release-fast/red
          strip target/release-fast/red_client

      - name: Package
        run: |
          cp target/release-fast/red red-linux-x86_64
          cp target/release-fast/red_client red_client-linux-x86_64
          shasum -a 256 red-linux-x86_64 > red-linux-x86_64.sha256
          shasum -a 256 red_client-linux-x86_64 > red_client-linux-x86_64.sha256

      - name: Smoke test
        run: |
          ./red-linux-x86_64 version
          set +e; ./red_client-linux-x86_64; rc=$?; set -e
          [[ "$rc" == "1" ]] || { echo "red_client smoke: expected exit 1, got $rc"; exit 1; }

      - uses: actions/upload-artifact@v7
        with:
          name: linux-x86_64
          path: |
            red-linux-x86_64
            red-linux-x86_64.sha256
            red_client-linux-x86_64
            red_client-linux-x86_64.sha256

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true

  publish-github:
    name: GitHub Pre-release
    needs: [plan, build-linux]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@v7

      - name: Install Syft
        id: syft
        uses: anchore/sbom-action/download-syft@v0.24.0
        with:
          syft-version: v1.46.0

      - name: Generate source SBOMs
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.plan.outputs.rc_tag }}
          SYFT: ${{ steps.syft.outputs.cmd }}
        run: |
          set -euo pipefail
          mkdir -p release-sbom
          VERSION="${RELEASE_TAG#v}"
          syft_args=(
            scan dir:.
            --exclude './.git/**'
            --exclude './release/**'
            --exclude './release-sbom/**'
            --source-name RedDB
            --source-version "${VERSION}"
          )
          "${SYFT}" "${syft_args[@]}" -o spdx-json > "release-sbom/red-${RELEASE_TAG}.spdx.json"
          "${SYFT}" "${syft_args[@]}" -o cyclonedx-json > "release-sbom/red-${RELEASE_TAG}.cyclonedx.json"
          test -s "release-sbom/red-${RELEASE_TAG}.spdx.json"
          test -s "release-sbom/red-${RELEASE_TAG}.cyclonedx.json"

      - uses: actions/download-artifact@v8
        with:
          path: release
          merge-multiple: true

      - name: Add SBOMs to release assets
        run: cp release-sbom/* release/

      - name: Generate checksum manifest
        shell: bash
        run: |
          set -euo pipefail
          (
            cd release
            find . -maxdepth 1 -type f \( -name 'red-*' -o -name 'red_client-*' \) ! -name '*.sha256' -print0 \
              | sort -z \
              | xargs -0 sha256sum \
              | sed 's#  \./#  #'
          ) > release/checksums.txt
          test -s release/checksums.txt
          cp release/checksums.txt release/SHA256SUMS
          echo "---- checksums.txt ----"
          cat release/checksums.txt

      - name: Attest release candidate artifacts
        uses: actions/attest@v4
        with:
          subject-checksums: release/SHA256SUMS

      - name: Create pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.plan.outputs.rc_tag }}
          name: RedDB ${{ needs.plan.outputs.rc_tag }}
          prerelease: true
          body: |
            Release candidate built from `${{ github.sha }}` with `--profile release-fast`.

            **Not for production use.** Linux x86_64 binary only.

            ```bash
            # Server + embedded engine
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ needs.plan.outputs.rc_tag }}/red-linux-x86_64
            chmod +x red-linux-x86_64

            # Thin remote-only client
            curl -fsSLO https://github.com/${{ github.repository }}/releases/download/${{ needs.plan.outputs.rc_tag }}/red_client-linux-x86_64
            chmod +x red_client-linux-x86_64

            # Verify downloaded binaries against the aggregate checksum manifest.
            curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ needs.plan.outputs.rc_tag }}/SHA256SUMS -o SHA256SUMS
            grep -E '  (red|red_client)-linux-x86_64$' SHA256SUMS | sha256sum -c -
            ```
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    name: Publish npm packages @rc
    needs: [plan, publish-github]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - name: Enable pnpm
        run: corepack enable

      - name: Sync RC version across all manifests
        run: |
          RC_VERSION="${{ needs.plan.outputs.rc_version }}"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json','utf8'));p.version='${RC_VERSION}';fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
          node scripts/sync-version.js
          bash scripts/check-versions.sh

      - name: Publish all public packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "::warning::NPM_TOKEN not set — skipping npm @rc publish."
            exit 0
          fi
          for PKG_DIR in . drivers/js drivers/js-client drivers/bun; do
            echo "==> publishing ${PKG_DIR}"
            pnpm publish --filter "./${PKG_DIR}" --tag rc --access public --no-git-checks
          done

  publish-cargo:
    name: Skip crates @rc
    needs: [plan, build-linux]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # Cargo pre-release publishing is intentionally skipped. The Rust workspace has
    # internal path dependency cycles (notably wire <-> grpc-proto) that make exact
    # RC version rewriting unsafe; stable release publishing remains authoritative.
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Skip crates.io RC publish
        run: |
          echo "::notice::Skipping crates.io @rc publish for ${{ needs.plan.outputs.rc_version }}."
          echo "::notice::Stable release publishing is still verified by the Release workflow."
