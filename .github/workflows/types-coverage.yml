name: Types Coverage

# Hard coverage gate for the reddb-io-types keystone crate.
#
# The type system is an authority crate. This workflow fails the PR if
# isolated line coverage drops below 90%.

on:
  push:
    branches: [main]
    paths:
      - 'crates/reddb-types/**'
      - '.github/workflows/types-coverage.yml'
  pull_request:
    paths:
      - 'crates/reddb-types/**'
      - '.github/workflows/types-coverage.yml'
  workflow_dispatch:

concurrency:
  group: types-coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  types-coverage:
    name: Types Coverage Gate
    if: github.actor != 'dependabot[bot]'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 20
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          components: llvm-tools-preview

      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-rust-1.91.0-llvm-cov
          cache-on-failure: "true"

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run coverage gate (reddb-io-types)
        run: |
          set -o pipefail
          cargo llvm-cov -p reddb-io-types --summary-only --fail-under-lines 90 | tee coverage-summary.txt

      - name: Build report
        id: report
        run: |
          {
            echo "## Types Coverage Gate"
            echo ""
            echo "Crate: \`reddb-io-types\` — hard minimum: **90% line coverage**"
            echo ""
            echo '```'
            cat coverage-summary.txt
            echo '```'
            echo ""
            echo "> Run locally: \`cargo llvm-cov -p reddb-io-types --summary-only --fail-under-lines 90\`"
          } > coverage-report.md

          # Mirror to the job summary so the signal is visible without a PR.
          cat coverage-report.md >> "$GITHUB_STEP_SUMMARY"

          # Expose the rendered body for the PR-comment step.
          {
            echo "body<<TYPES_COV_EOF"
            echo "<!-- types-coverage-comment -->"
            cat coverage-report.md
            echo "TYPES_COV_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          TYPES_COVERAGE_BODY: ${{ steps.report.outputs.body }}
        with:
          script: |
            const marker = '<!-- types-coverage-comment -->';
            const body = process.env.TYPES_COVERAGE_BODY;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
