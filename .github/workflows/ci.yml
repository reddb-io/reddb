name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG**'
      - 'LICENSE**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/Cargo.toml'
      - 'package.json'
      - '**/package.json'
      - 'pnpm-lock.yaml'
      - 'drivers/python/pyproject.toml'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG**'
      - 'LICENSE**'
  workflow_dispatch:
    inputs:
      full_ci:
        description: Run expensive cross-platform and release-adjacent jobs
        type: boolean
        default: false

# Cost guard: new pushes cancel older runs on the same ref. Release-grade
# validation lives in release.yml; CI push runs should stay quick.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # Sentinel job — short-circuits everything else when the PR is a draft or from
  # Dependabot (Dependabot PRs run the dedicated dependabot.yml workflow instead).
  gate:
    name: gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    steps:
      - run: echo "ok"

  serialization-lint:
    # Issue #180 / ADR 0010 — grep-based preflight that flags new
    # untyped serialization across the four boundaries hardened by
    # the typed guards (`HeaderEscapeGuard`, `AuditFieldEscaper`,
    # `SerializedJsonField`, `ConnStringSanitizer`/`Tainted<T>`). The
    # lint runs in seconds; it's a fast feedback loop independent of
    # cargo cache state.
    #
    # Soft-fail mode: `continue-on-error: true` keeps the job
    # advisory for one release cycle so contributors learn the new
    # rule without breaking PRs on a class of bug grep is only
    # syntactically aware of. Upgrade path:
    #   1. Wait one release cycle of green/advisory runs.
    #   2. Drain the residue tracked in
    #      `scripts/lint-untyped-serialization-whitelist.txt` to
    #      acceptable size (every entry has an issue).
    #   3. Remove `continue-on-error` to flip to hard-fail; once
    #      flipped, every new violation must either migrate to the
    #      typed guard or land on the whitelist with a tracking
    #      issue, same as clippy.
    name: Lint (no untyped serialization)
    needs: gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - name: Run grep-based serialization-boundary lint
        run: bash scripts/lint-no-untyped-serialization.sh crates/
      - name: Self-test against fixture (lint must catch every category)
        # `tests/lint-fixtures/violations.rs.fixture` carries one
        # violation per category. The lint is correct iff it exits
        # non-zero on the fixture and the output names every category
        # tag the script emits.
        run: |
          set +e
          out=$(bash scripts/lint-no-untyped-serialization.sh tests/lint-fixtures/violations.rs.fixture 2>&1)
          rc=$?
          set -e
          echo "$out"
          if [ "$rc" -eq 0 ]; then
            echo "FAIL: lint exited 0 against the fixture (it should catch every category)"
            exit 1
          fi
          for cat in tracing+format header+format audit+format json+format tainted-unwrap header-from-str; do
            if ! printf '%s' "$out" | grep -qF "[$cat]"; then
              echo "FAIL: fixture is missing a violation for category [$cat]"
              exit 1
            fi
          done
          echo "OK: every lint category was triggered by the fixture"

  version-integrity:
    # Locks every publish target (engine crate, workspace crates, Cargo.lock,
    # @reddb-io/* npm packages, drivers/python, bun, internal packages) to one
    # version, AND fails if the committed version has fallen BEHIND the latest
    # published vX.Y.Z tag — the drift that happens when a release is cut via a
    # manual release.yml dispatch instead of the Changesets "Version Packages"
    # PR. release.yml runs this same script as a hard gate at publish time; here
    # it gives the feedback on every normal PR/push. Needs full tag history
    # (fetch-depth: 0) so the drift guard can see the published tags.
    name: Version integrity
    needs: gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Check version lock-step + drift guard
        run: bash scripts/check-versions.sh

  contract-matrix:
    # Issue #567 — public-surface contract matrix gate. Fails the build
    # (and, on the release workflow, blocks the release) when any cell
    # marked `supported`/`partial` lacks an existing backing test. The
    # release-blocking policy is owned by @filipeforattini (see
    # .github/CODEOWNERS for docs/conformance/ and scripts/verify-contract-matrix.mjs).
    name: Contract Matrix Gate
    needs: gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Verify every supported cell has a backing test
        run: node scripts/verify-contract-matrix.mjs
      - name: Contract-matrix tooling contract test
        run: node --test scripts/contract_matrix_contract.test.mjs
      - name: Installer checksum contract test
        run: node --test scripts/install_script_contract.test.mjs
      - name: Docs-shim ⇔ required-checks ⇔ ci.yml lock-step (#1307)
        run: node --test scripts/ci-docs-shim-contract.test.mjs

  docs-matrix:
    # Issue #568 — public docs (README, docs/query/*.md, driver READMEs) are
    # checked against the contract matrix. The matrix is the source of truth;
    # scripts/gen-docs-from-matrix.mjs projects it into a marker-delimited
    # support block in every public doc, and `--check` fails the build when a
    # doc drifts from the matrix — so a doc can never promise a feature the
    # matrix does not mark supported. Run `--write` locally to regenerate.
    name: Docs Match Contract Matrix
    needs: gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Check public docs match the contract matrix
        run: node scripts/gen-docs-from-matrix.mjs --check
      - name: Doc-generation tooling contract test
        run: node --test scripts/docs_matrix_contract.test.mjs

  helm-chart:
    name: Helm Chart
    needs: gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: Azure/setup-helm@v5
      - name: Lint and render topology matrix
        run: make check-helm

  afk-validation-sidecar:
    # Issue #970 — machine-check AFK's structured validation sidecar against
    # the actual merged diff. The contract test always runs; the live diff
    # check activates when an AFK/CI caller supplies RED_AFK_VALIDATION_SIDECAR.
    name: AFK Validation Sidecar
    needs: gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Sidecar tooling contract test
        run: node --test scripts/check-afk-validation-diff.test.mjs
      - name: Check supplied AFK validation sidecar against diff
        run: |
          if [ -z "${RED_AFK_VALIDATION_SIDECAR:-}" ]; then
            echo "No RED_AFK_VALIDATION_SIDECAR supplied; contract test covered the gate."
            exit 0
          fi
          node scripts/check-afk-validation-diff.mjs \
            --sidecar "$RED_AFK_VALIDATION_SIDECAR" \
            --base "${RED_AFK_VALIDATION_BASE:-origin/main}" \
            --head "${RED_AFK_VALIDATION_HEAD:-HEAD}"

  quality:
    name: Quality (fmt, check, clippy)
    needs: gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          components: rustfmt, clippy
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-rust-1.91.0
          cache-on-failure: "true"
      - run: cargo fmt --all -- --check
      - run: cargo check --locked --all
      - run: cargo clippy --locked --all -- -D warnings
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  rql-conformance:
    # PRD #1098 / ADR 0053 — the `reddb-io-rql` crate owns the
    # correctness specification of execution: an sqllogictest-format
    # conformance suite whose truth comes from the public SQLite corpus.
    # This job runs that corpus end-to-end against the current in-server
    # engine (`reddb-server`'s `RedDBRuntime`). It is the behavioral net
    # every later RQL-extraction slice must keep green.
    name: RQL Conformance (sqllogictest)
    needs: gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-rust-1.91.0
          cache-on-failure: "true"
      - name: Run sqllogictest conformance corpus against the server engine
        run: cargo test --locked --test grouped_surface_contracts rql_
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  drivers-python-build:
    # Issue #664 — `drivers/python` opts out of the workspace (it's a
    # maturin cdylib, not a workspace member), so `cargo check --all`
    # in `quality` does not cover it. Build both feature combinations
    # explicitly to catch breakage like the 37-error tonic/prost drift
    # that motivated this gate.
    name: Drivers / Python (cargo check)
    needs: gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 15
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: drivers-python-rust-1.91.0
          cache-on-failure: "true"
          workspaces: drivers/python -> target
      - name: cargo check --no-default-features (slim grpc/wire client only)
        working-directory: drivers/python
        run: cargo check --locked --no-default-features
      - name: "cargo check (default: embedded engine)"
        working-directory: drivers/python
        run: cargo check --locked

  feature-matrix:
    # PLAN.md B5 — compile every supported feature combination that
    # operators may select for release artifacts.
    name: Feature Matrix (${{ matrix.features.label }})
    needs: gate
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.full_ci)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        features:
          - label: no-default
            args: --no-default-features
          - label: otel
            args: --no-default-features --features otel
          - label: backend-s3
            args: --no-default-features --features backend-s3
          - label: backend-turso
            args: --no-default-features --features backend-turso
          - label: backend-d1
            args: --no-default-features --features backend-d1
          - label: all-features
            args: --all-features
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-features-rust-1.91.0-${{ matrix.features.label }}
          cache-on-failure: "true"
      - name: cargo check
        run: cargo check --locked ${{ matrix.features.args }}

  tests:
    name: Test Suite
    needs: gate
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-rust-1.91.0
          cache-on-failure: "true"
          workspaces: |
            . -> target
            . -> target/persistent-tests
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Prepare isolated temp dir
        run: |
          mkdir -p "$RUNNER_TEMP/reddb-test-suite-tmp"
          echo "TMPDIR=$RUNNER_TEMP/reddb-test-suite-tmp" >> "$GITHUB_ENV"
      - name: Build red_client (cross-binary smoke prereq)
        run: cargo build --locked --bin red_client -p reddb-io-client --no-default-features
      - name: red_client size budget
        run: ./scripts/check-red-client-size.sh
      - name: Run default test layer (nextest — parallel across test binaries)
        # cargo test runs the grouped integration binaries sequentially, so the
        # per-test sleeps (replication/timing tests) sum and blew past the 20m
        # cap. nextest runs every test in a global parallel process pool (sleeps
        # overlap) and the `ci` profile enforces a hard per-test timeout
        # (.config/nextest.toml) so a hung test is killed, not the whole run.
        run: cargo nextest run --workspace --locked --profile ci
      - name: Doctests (nextest does not execute doctests)
        run: cargo test --workspace --locked --doc
      - name: Run persistent multimodel layer
        env:
          CARGO_TARGET_DIR: target/persistent-tests
        run: >-
          cargo test --locked --test grouped_general_multimodel integration_persistent_multimodel -- --ignored
      - name: Report temp-file residue (advisory leak guard)
        # Issue #972 — report reddb-*/reddb_*/*.rdb/*.wal residue left in the
        # dedicated per-run TMPDIR after the full test suite. The TMPDIR
        # (RUNNER_TEMP/reddb-test-suite-tmp) is ephemeral, so individual test
        # leaks are harmless; the guard now cleans them wholesale and emits a
        # CI warning rather than failing the build (see the script header).
        # Per-test cleanup via tests/support/mod.rs remains the hygiene goal,
        # surfaced as a warning instead of a merge gate.
        run: bash scripts/check-temp-residue.sh
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  driver-param-conformance:
    name: Driver Param Conformance
    needs: gate
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.full_ci)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: drivers/go/go.sum
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, hash, json, openssl
      - uses: mlugg/setup-zig@v2
      - name: JS RedWire parameter fixtures
        working-directory: drivers/js
        run: node --test test/redwire.params.test.mjs
      - name: Rust RedWire parameter fixtures
        run: cargo test -p reddb-io-wire --test params_fixtures
      - name: Rust gRPC parameter fixtures
        run: cargo test -p reddb-io-client --features grpc --lib grpc_params_match_shared_fixtures
      - name: Go RedWire/gRPC parameter fixtures
        working-directory: drivers/go
        run: go test ./redwire ./grpcx
      - name: Java RedWire parameter fixtures
        working-directory: drivers/java
        run: ./gradlew test --tests dev.reddb.ValueCodecTest
      - name: Kotlin RedWire parameter fixtures
        working-directory: drivers/kotlin
        run: ./gradlew test --tests dev.reddb.ValueCodecTest
      - name: .NET RedWire parameter fixtures
        run: dotnet test drivers/dotnet/tests/Reddb.Tests/Reddb.Tests.csproj --filter FullyQualifiedName~ValueCodecTests
      - name: Dart RedWire parameter fixtures
        working-directory: drivers/dart
        run: dart test test/value_codec_test.dart
      - name: PHP RedWire parameter fixtures
        working-directory: drivers/php
        run: composer install --no-interaction --no-progress && vendor/bin/phpunit --filter ValueCodecTest
      - name: Zig RedWire parameter fixtures
        working-directory: drivers/zig
        run: zig build param-fixtures --summary all
      - name: C++ RedWire parameter fixtures configure
        run: cmake -S drivers/cpp -B /tmp/reddb-cpp-param-conformance -DCMAKE_BUILD_TYPE=Release
      - name: C++ RedWire parameter fixtures build
        run: cmake --build /tmp/reddb-cpp-param-conformance --target value_codec_test -j2
      - name: C++ RedWire parameter fixtures
        run: /tmp/reddb-cpp-param-conformance/value_codec_test

  publish-dry-run:
    # Catches crates.io packaging issues (missing include paths, stale
    # path-only deps, license mismatch) before they bite at release
    # time. `cargo package` with verify rebuilds the engine from the
    # tarball, so this also exercises the include manifest end-to-end.
    name: Publish Dry-Run (crates.io)
    needs: gate
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.full_ci)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-publish-dryrun-rust-1.91.0
          cache-on-failure: "true"
      - name: cargo package (workspace manifests)
        run: cargo package --workspace --allow-dirty --no-verify
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  containers:
    name: Container Stack
    needs: gate
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.full_ci)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - name: Build and start primary + replica
        run: docker compose -f testdata/compose/replica.yml up -d --build
      - name: Wait for HTTP health endpoints
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:5000/health/live >/dev/null && curl -fsS http://127.0.0.1:5001/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f testdata/compose/replica.yml ps
          docker compose -f testdata/compose/replica.yml logs
          exit 1
      - name: Verify gRPC listeners inside containers
        run: |
          docker compose -f testdata/compose/replica.yml exec -T primary /usr/local/bin/red health --grpc --bind 127.0.0.1:55055
          docker compose -f testdata/compose/replica.yml exec -T replica /usr/local/bin/red health --grpc --bind 127.0.0.1:55055
      - name: Verify primary and replica respond over HTTP
        run: |
          curl -fsS http://127.0.0.1:5000/health/live
          curl -fsS http://127.0.0.1:5001/health/live
      - name: Show container status
        if: always()
        run: docker compose -f testdata/compose/replica.yml ps
      - name: Dump container logs
        if: failure()
        run: docker compose -f testdata/compose/replica.yml logs
      - name: Tear down stack
        if: always()
        run: docker compose -f testdata/compose/replica.yml down -v

  chaos:
    # PLAN.md Phase 8.4 — chaos & crash hardening matrix.
    # Runs the chaos tests plus backup/restore drills shipped in
    # the consolidated grouped test binaries. Failure is a release blocker.
    name: Chaos & Drill Suite
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'workflow_dispatch' && inputs.full_ci
    timeout-minutes: 25
    needs: tests
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-rust-1.91.0
          cache-on-failure: "true"
      - name: Run chaos, drill, and persistence tests
        run: cargo test --locked --test grouped_chaos_drill_persistence --no-fail-fast

  chaos-floci:
    # PLAN.md Phase 8.4 — chaos suite against an S3-compatible
    # backend (Floci) so the LocalBackend coverage doesn't mask
    # backend-specific failure modes.
    name: Chaos Suite (Floci S3 backend)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: github.event_name == 'workflow_dispatch' && inputs.full_ci
    timeout-minutes: 25
    needs: tests
    env:
      RED_BACKEND: s3
      RED_S3_ENDPOINT: http://localhost:55466
      RED_S3_BUCKET: reddb-ci
      RED_S3_REGION: us-east-1
      RED_S3_PATH_STYLE: "true"
      RED_S3_ACCESS_KEY: test
      RED_S3_SECRET_KEY: test
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-rust-1.91.0
          cache-on-failure: "true"
      - name: Start Floci
        run: |
          docker run -d --name reddb-ci-floci \
            -p 55466:4566 \
            floci/floci:latest
      - name: Wait for Floci + create bucket
        run: |
          ready=false
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:55466/_localstack/health; then
              ready=true
              break
            fi
            sleep 2
          done
          if [ "$ready" != "true" ]; then
            docker logs reddb-ci-floci || true
            exit 1
          fi
          bucket=false
          for _ in $(seq 1 10); do
            if docker run --rm --network host \
              -e AWS_ACCESS_KEY_ID=test \
              -e AWS_SECRET_ACCESS_KEY=test \
              -e AWS_DEFAULT_REGION=us-east-1 \
              amazon/aws-cli:latest \
              --endpoint-url http://localhost:55466 s3 mb s3://reddb-ci; then
              bucket=true
              break
            fi
            sleep 2
          done
          if [ "$bucket" != "true" ]; then
            docker logs reddb-ci-floci || true
            exit 1
          fi
      - run: cargo test --locked --test grouped_chaos_drill_persistence --no-fail-fast chaos_
      - name: Stop Floci
        if: always()
        run: docker rm -f reddb-ci-floci || true

  windows:
    # Phase 3.6 PG parity — verify RedDB compiles + passes the core unit
    # test suite on Windows. Excludes Linux-only integration tests
    # (systemd install, mmap, Unix sockets) via cfg gates in the source.
    name: Windows (build + unit tests)
    needs: gate
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.full_ci)
    runs-on: blacksmith-8vcpu-windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-rust-1.91.0
          cache-on-failure: "true"
      - name: Check
        run: cargo check --locked --all
      - name: Unit tests
        # Skip integration tests that hit Unix-only facilities (systemd,
        # mmap, /proc). --lib stays within the library crate.
        run: cargo test --locked --lib

  macos:
    # Mirror of the Windows job for Darwin; keeps the cross-platform
    # story complete. Same scope — library build + unit tests.
    name: macOS (build + unit tests)
    needs: gate
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.full_ci)
    runs-on: blacksmith-6vcpu-macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-rust-1.91.0
          cache-on-failure: "true"
      - name: Check
        run: cargo check --locked --all
      - name: Unit tests
        run: cargo test --locked --lib

  fuzz-targets:
    # Issue #87 — short-window cargo-fuzz run on every PR.
    # Catches panics introduced by grammar changes; the long-window
    # nightly run lives in a separate scheduled workflow.
    #
    # Each parser fuzzes in its own parallel job. The aggregate
    # required status check lives in the `fuzz-parsers` job below
    # (name: "Fuzz Parsers"), which is what main's branch protection
    # gates on — keep that name in lockstep with branch protection.
    name: Fuzz ${{ matrix.target }}
    needs: gate
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.full_ci)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        target:
          - sql_parser
          - migration_parser
          - conn_string_parser
          - query_with_params
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@nightly
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          # Per-target cache key so parallel jobs don't thrash a
          # shared cache entry.
          shared-key: ubuntu-fuzz-nightly-${{ matrix.target }}
          cache-on-failure: "true"
          workspaces: |
            . -> target
            fuzz -> fuzz/target
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz target
        run: cargo +nightly fuzz build ${{ matrix.target }}
      - name: Run fuzz target (5 min)
        # Issue #90 — conn_string_parser is a pre-auth parser, panic-
        # resistance is the only invariant; conn-string sees attacker-
        # controlled bytes before any handshake completes, so we bake
        # it into the same per-PR window as the SQL fuzzer.
        #
        # -rss_limit_mb / -malloc_limit_mb make libFuzzer report an
        # allocation-DoS (a crafted input that balloons a parser buffer)
        # as an actionable crash finding instead of a silent runner
        # OOM/timeout. scripts/fuzz-local.sh mirrors these limits (plus a
        # systemd memory cgroup) for safe fuzzing on a dev box.
        run: cargo +nightly fuzz run ${{ matrix.target }} -- -max_total_time=300 -rss_limit_mb=4096 -malloc_limit_mb=2048
      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes-${{ matrix.target }}
          path: |
            fuzz/artifacts/
            fuzz/corpus/
          retention-days: 14

  fuzz-parsers:
    # Aggregator that preserves the EXACT required status-check name
    # "Fuzz Parsers" expected by main's branch protection. It succeeds
    # iff every matrix job in fuzz-targets succeeded. Do not rename.
    name: Fuzz Parsers
    needs: [fuzz-targets]
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.full_ci)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify all fuzz targets passed
        run: |
          if [ "${{ needs.fuzz-targets.result }}" != "success" ]; then
            echo "a fuzz target failed"
            exit 1
          fi

  package:
    name: cargo package dry-run
    needs: gate
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.full_ci)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: ./.github/actions/install-protoc
        with:
          version: '28.3'
      - uses: Swatinem/rust-cache@v2
      - name: cargo package --workspace
        run: cargo package --workspace --allow-dirty --no-verify
