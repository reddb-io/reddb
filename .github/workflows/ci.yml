name: CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG**'
      - 'LICENSE**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '**/Cargo.toml'
      - 'package.json'
      - '**/package.json'
      - 'pnpm-lock.yaml'
      - 'drivers/python/pyproject.toml'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CHANGELOG**'
      - 'LICENSE**'
  workflow_dispatch:

# Cost guard: a fresh push to a PR cancels the previous run. Devs
# iterating on a branch don't double-pay 16 jobs per push.
# Pushes to main/develop don't cancel — those are release-grade.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # Sentinel job — short-circuits everything else when the PR is a draft or from
  # Dependabot (Dependabot PRs run the dedicated dependabot.yml workflow instead).
  gate:
    name: gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    steps:
      - run: echo "ok"

  serialization-lint:
    # Issue #180 / ADR 0010 — grep-based preflight that flags new
    # untyped serialization across the four boundaries hardened by
    # the typed guards (`HeaderEscapeGuard`, `AuditFieldEscaper`,
    # `SerializedJsonField`, `ConnStringSanitizer`/`Tainted<T>`). The
    # lint runs in seconds; it's a fast feedback loop independent of
    # cargo cache state.
    #
    # Soft-fail mode: `continue-on-error: true` keeps the job
    # advisory for one release cycle so contributors learn the new
    # rule without breaking PRs on a class of bug grep is only
    # syntactically aware of. Upgrade path:
    #   1. Wait one release cycle of green/advisory runs.
    #   2. Drain the residue tracked in
    #      `scripts/lint-untyped-serialization-whitelist.txt` to
    #      acceptable size (every entry has an issue).
    #   3. Remove `continue-on-error` to flip to hard-fail; once
    #      flipped, every new violation must either migrate to the
    #      typed guard or land on the whitelist with a tracking
    #      issue, same as clippy.
    name: Lint (no untyped serialization)
    needs: gate
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Run grep-based serialization-boundary lint
        run: bash scripts/lint-no-untyped-serialization.sh crates/
      - name: Self-test against fixture (lint must catch every category)
        # `tests/lint-fixtures/violations.rs.fixture` carries one
        # violation per category. The lint is correct iff it exits
        # non-zero on the fixture and the output names every category
        # tag the script emits.
        run: |
          set +e
          out=$(bash scripts/lint-no-untyped-serialization.sh tests/lint-fixtures/violations.rs.fixture 2>&1)
          rc=$?
          set -e
          echo "$out"
          if [ "$rc" -eq 0 ]; then
            echo "FAIL: lint exited 0 against the fixture (it should catch every category)"
            exit 1
          fi
          for cat in tracing+format header+format audit+format json+format tainted-unwrap header-from-str; do
            if ! printf '%s' "$out" | grep -qF "[$cat]"; then
              echo "FAIL: fixture is missing a violation for category [$cat]"
              exit 1
            fi
          done
          echo "OK: every lint category was triggered by the fixture"

  quality:
    name: Quality (fmt, check, clippy)
    needs: gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
        with:
          components: rustfmt, clippy
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-rust-1.91.0
          cache-on-failure: "true"
      - run: cargo fmt --all -- --check
      - run: cargo check --locked --all
      - run: cargo clippy --locked --all -- -D warnings
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  feature-matrix:
    # PLAN.md B5 — compile every supported feature combination that
    # operators may select for release artifacts.
    name: Feature Matrix (${{ matrix.features.label }})
    needs: gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        features:
          - label: no-default
            args: --no-default-features
          - label: otel
            args: --no-default-features --features otel
          - label: backend-s3
            args: --no-default-features --features backend-s3
          - label: backend-turso
            args: --no-default-features --features backend-turso
          - label: backend-d1
            args: --no-default-features --features backend-d1
          - label: all-features
            args: --all-features
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-features-rust-1.91.0-${{ matrix.features.label }}
          cache-on-failure: "true"
      - name: cargo check
        run: cargo check --locked ${{ matrix.features.args }}

  tests:
    name: Test Suite
    needs: gate
    runs-on: blacksmith-8vcpu-ubuntu-2404
    timeout-minutes: 20
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-rust-1.91.0
          cache-on-failure: "true"
          workspaces: |
            . -> target
            . -> target/persistent-tests
      - name: Build red_client (cross-binary smoke prereq)
        run: cargo build --locked --bin red_client -p reddb-io-client --no-default-features
      - name: red_client size budget
        run: ./scripts/check-red-client-size.sh
      - name: Run default test layer
        run: cargo test --locked --verbose
      - name: Run persistent multimodel layer
        env:
          CARGO_TARGET_DIR: target/persistent-tests
        run: cargo test --locked --test integration_persistent_multimodel -- --ignored
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  publish-dry-run:
    # Catches crates.io packaging issues (missing include paths, stale
    # path-only deps, license mismatch) before they bite at release
    # time. `cargo package` with verify rebuilds the engine from the
    # tarball, so this also exercises the include manifest end-to-end.
    name: Publish Dry-Run (crates.io)
    needs: gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-publish-dryrun-rust-1.91.0
          cache-on-failure: "true"
      - name: cargo package (workspace manifests)
        # Offline packaging verifies the workspace manifests against local
        # path deps before the new reddb-io* crate names exist on crates.io.
        run: cargo package --workspace --allow-dirty --no-verify --offline
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  containers:
    name: Container Stack
    needs: gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Build and start primary + replica
        run: docker compose -f testdata/compose/replica.yml up -d --build
      - name: Wait for HTTP health endpoints
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/health/live >/dev/null && curl -fsS http://127.0.0.1:8081/health/live >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f testdata/compose/replica.yml ps
          docker compose -f testdata/compose/replica.yml logs
          exit 1
      - name: Verify gRPC listeners inside containers
        run: |
          docker compose -f testdata/compose/replica.yml exec -T primary /usr/local/bin/red health --grpc --bind 127.0.0.1:50051
          docker compose -f testdata/compose/replica.yml exec -T replica /usr/local/bin/red health --grpc --bind 127.0.0.1:50051
      - name: Verify primary and replica respond over HTTP
        run: |
          curl -fsS http://127.0.0.1:8080/health/live
          curl -fsS http://127.0.0.1:8081/health/live
      - name: Show container status
        if: always()
        run: docker compose -f testdata/compose/replica.yml ps
      - name: Dump container logs
        if: failure()
        run: docker compose -f testdata/compose/replica.yml logs
      - name: Tear down stack
        if: always()
        run: docker compose -f testdata/compose/replica.yml down -v

  chaos:
    # PLAN.md Phase 8.4 — chaos & crash hardening matrix.
    # Runs the 8 chaos tests + 3 backup/restore drills shipped in
    # tests/chaos_*.rs and tests/drill_*.rs. Failure is a release blocker.
    name: Chaos & Drill Suite
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    needs: tests
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-rust-1.91.0
          cache-on-failure: "true"
      - name: Run chaos tests
        run: cargo test --locked --test 'chaos_*' --no-fail-fast
      - name: Run drill tests
        run: cargo test --locked --test 'drill_*' --no-fail-fast

  chaos-minio:
    # PLAN.md Phase 8.4 — chaos suite against an S3-compatible
    # backend (MinIO) so the LocalBackend coverage doesn't mask
    # backend-specific failure modes.
    name: Chaos Suite (MinIO S3 backend)
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    needs: tests
    services:
      minio:
        image: minio/minio:latest
        ports: ['9000:9000']
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/ready || exit 1"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      RED_BACKEND: s3
      RED_S3_ENDPOINT: http://localhost:9000
      RED_S3_BUCKET: reddb-ci
      RED_S3_REGION: us-east-1
      RED_S3_PATH_STYLE: "true"
      RED_S3_ACCESS_KEY: minioadmin
      RED_S3_SECRET_KEY: minioadmin
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-rust-1.91.0
          cache-on-failure: "true"
      - name: Wait for MinIO + create bucket
        run: |
          curl -fsS --retry 10 --retry-delay 2 http://localhost:9000/minio/health/ready
          docker run --rm --network host minio/mc:latest \
            sh -c "mc alias set ci http://localhost:9000 minioadmin minioadmin && mc mb -p ci/reddb-ci || true"
      - run: cargo test --locked --test 'chaos_*' --no-fail-fast

  windows:
    # Phase 3.6 PG parity — verify RedDB compiles + passes the core unit
    # test suite on Windows. Excludes Linux-only integration tests
    # (systemd install, mmap, Unix sockets) via cfg gates in the source.
    name: Windows (build + unit tests)
    needs: gate
    runs-on: blacksmith-8vcpu-windows-2025
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: windows-rust-1.91.0
          cache-on-failure: "true"
      - name: Check
        run: cargo check --locked --all
      - name: Unit tests
        # Skip integration tests that hit Unix-only facilities (systemd,
        # mmap, /proc). --lib stays within the library crate.
        run: cargo test --locked --lib

  macos:
    # Mirror of the Windows job for Darwin; keeps the cross-platform
    # story complete. Same scope — library build + unit tests.
    name: macOS (build + unit tests)
    needs: gate
    runs-on: blacksmith-6vcpu-macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: macos-rust-1.91.0
          cache-on-failure: "true"
      - name: Check
        run: cargo check --locked --all
      - name: Unit tests
        run: cargo test --locked --lib

  fuzz-parsers:
    # Issue #87 — short-window cargo-fuzz run on every PR.
    # Catches panics introduced by grammar changes; the long-window
    # nightly run lives in a separate scheduled workflow.
    name: Fuzz Parsers
    needs: gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.10
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ubuntu-fuzz-nightly
          cache-on-failure: "true"
          workspaces: |
            . -> target
            fuzz -> fuzz/target
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build fuzz targets
        run: |
          cargo +nightly fuzz build sql_parser
          cargo +nightly fuzz build migration_parser
          cargo +nightly fuzz build conn_string_parser
      - name: Run sql_parser fuzz target (5 min)
        run: cargo +nightly fuzz run sql_parser -- -max_total_time=300
      - name: Run migration_parser fuzz target (5 min)
        run: cargo +nightly fuzz run migration_parser -- -max_total_time=300
      - name: Run conn_string_parser fuzz target (5 min)
        # Issue #90 — pre-auth parser, panic-resistance is the only
        # invariant; conn-string sees attacker-controlled bytes
        # before any handshake completes, so we bake it into the
        # same per-PR window as the SQL fuzzer.
        run: cargo +nightly fuzz run conn_string_parser -- -max_total_time=300
      - name: Upload fuzz crash artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes
          path: |
            fuzz/artifacts/
            fuzz/corpus/
          retention-days: 14

  package:
    name: cargo package dry-run
    needs: gate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.91.0
      - uses: arduino/setup-protoc@v3
        with:
          version: '28.x'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo package --workspace
        run: cargo package --workspace --allow-dirty --no-verify
