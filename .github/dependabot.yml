version: 2
updates:
  # Engine — Rust crates. Group framework bumps; security advisories
  # always land as their own PR (Dependabot's default behaviour).
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    groups:
      tokio-stack:
        patterns: ["tokio", "tokio-*", "tonic", "tonic-*", "prost", "prost-*"]
      tls:
        patterns: ["rustls", "rustls-*", "tokio-rustls", "rcgen"]
      tracing:
        patterns: ["tracing", "tracing-*"]
      crypto:
        patterns: ["aes-gcm", "hmac", "sha2", "argon2"]

  # Drivers — independent ecosystems. Keep open-PR ceiling low because
  # version bumps cascade through publish workflows. The Rust client
  # is now part of the workspace at `crates/reddb-client/` and shares
  # the engine's `directory: /` cargo entry above.
  - package-ecosystem: cargo
    directory: /drivers/python
    schedule: { interval: weekly }
    open-pull-requests-limit: 2
  - package-ecosystem: pip
    directory: /drivers/python
    schedule: { interval: weekly }
    open-pull-requests-limit: 2
  - package-ecosystem: pip
    directory: /drivers/python-asyncio
    schedule: { interval: weekly }
    open-pull-requests-limit: 2
  - package-ecosystem: npm
    directory: /drivers/js
    schedule: { interval: weekly }
    open-pull-requests-limit: 2
  - package-ecosystem: gomod
    directory: /drivers/go
    schedule: { interval: weekly }
    open-pull-requests-limit: 2
  - package-ecosystem: composer
    directory: /drivers/php
    schedule: { interval: weekly }
    open-pull-requests-limit: 2

  # GitHub Actions — keep workflow base images / actions current.
  - package-ecosystem: github-actions
    directory: /
    schedule: { interval: weekly }
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  # Docker base images.
  - package-ecosystem: docker
    directory: /
    schedule: { interval: weekly }
    open-pull-requests-limit: 2
