# .red/config.yaml — per-project plugin settings (consumed by /afk and friends)
#
# The `plugins.dev` block controls the AFK dev plugin (red-castle/sandcastle
# execution substrate + AFK policy layer; split per ADR 0033). The `afk:`
# sub-block is namespaced under `plugins.dev.afk` and every knob accepts a
# `RED_AFK_*` env override that wins over the file. See ADR 0062 for the
# decision record on the protection rails below.

plugins:
  dev:
    enabled: true
    lock:
      primary-branch: true

    afk:
      # ----------------------------------------------------------------
      # Worker model tiers. Pin every Claude tier to opus-4-8/high so a
      # worker never falls through to the cheaper per-tier defaults
      # (validate defaults to low). Flattening every tier onto one slug
      # is the ADR 0049 posture; this is the durable form of the
      # RED_AFK_MODEL/RED_AFK_EFFORT env override, so no launch needs it.
      # Precedence: --model flag > RED_AFK_MODEL env > this block > defaults.
      # ----------------------------------------------------------------
      models:
        claude:
          validate:
            model: claude-opus-4-8
            effort: high
          simple:
            model: claude-opus-4-8
            effort: high
          complex:
            model: claude-opus-4-8
            effort: high
          think:
            model: claude-opus-4-8
            effort: high

      # ----------------------------------------------------------------
      # CI-aware merge (#812). On this enforce_admins base an admin-merge
      # cannot bypass required checks, so a completed PR whose checks
      # FAIL or stay PENDING is NOT a merge conflict: mark blocked:ci →
      # ready-for-human with the PR LEFT OPEN, and never re-run the agent.
      # Kills the re-claim churn where a failed-CI issue bounced back to
      # ready-for-agent and a second worker redid the whole thing.
      # ----------------------------------------------------------------
      merge:
        ci_aware: true

      # ----------------------------------------------------------------
      # PR review gate (ADR 0064 §10, #749). A completed NON-mechanical
      # attempt (classified tier at/above `threshold`) gets
      # `ready-for-review` on its PR and the merge is HELD for a
      # fresh-agent review — a different agent than the one that
      # implemented it reviews the diff and posts inline comments.
      # Mechanical/trivial work (fmt, bumps, one-liners) keeps the
      # fast-merge path. Only affects PR landings (worktree_launches_
      # pull_request: true, the default).
      # ----------------------------------------------------------------
      review_gate:
        enabled: true
        threshold: complex

      # ----------------------------------------------------------------
      # Backpressure — shell gates that run AFTER the agent's automatic
      # feedback loop (`pnpm test`/cargo check/etc. on touched packages)
      # and BEFORE the merge. If any command exits non-zero, the merge
      # is BLOCKED and the issue goes to `ready-for-human` with
      # `blocked:validation`; command + output land in the envelope.
      # This is shift-left: we catch cheap, local failures before
      # burning a CI round.
      # ----------------------------------------------------------------
      backpressure:
        # 1. Formatting (mirrors `.githooks/pre-push`).
        - cargo fmt --all -- --check

        # 2. Boundary-discipline lint (ADR 0010). Catches untyped
        #    serialization in tracing headers, JSON, audit, etc.
        - scripts/lint-no-untyped-serialization.sh

        # 3. Clippy at warn-as-error (mirrors CI's Quality gate).
        #    Pulled in here so a red local clippy fails the merge
        #    before the CI round-trip.
        #    Must stay byte-identical in scope to `.github/workflows/ci.yml`
        #    (`cargo clippy --locked --all -- -D warnings`). It carried
        #    `--all-targets` until 2026-07-19, which CI does not: that pulled in
        #    ~79 pre-existing test-target lints and failed the gate on every
        #    branch, parking innocent workers at `blocked:validation`. A gate
        #    stricter than CI blocks work CI would accept, which defeats the
        #    stated purpose above. Widen only by widening CI first.
        - cargo clippy --locked --all -- -D warnings

      # ----------------------------------------------------------------
      # Hooks — intercept the AFK loop at named lifecycle points.
      # Contract (ADR 0062):
      #   - Input: RED_AFK_* env vars + JSON context on stdin.
      #   - Output: stdout empty = no-op; JSON on stdout = AFK merges
      #             the mutable slice back into the loop context.
      #   - Exit: 0 = continue. `pre_*` non-zero aborts the step
      #     (use this for gates). `post_*`/`on_*` non-zero only logs
      #     (use this for notifiers — broken notifiers MUST NOT
      #     starve the AFK, per ADR 0059 lesson).
      # Unknown hook names are a HARD ERROR at boot — typo protection.
      #
      # Every hook below MUST be a scalar (a single string, `|` block for
      # multiple commands) — NOT a YAML list. As of bundle 2.74.4/2.74.6 the
      # loader flattens a list into indexed keys and then validates the
      # flattened key against the hook allowlist, so `pre_pick: [x]` is
      # rejected at boot as `unknown hook name 'pre_pick.0'` even though
      # `pre_pick` is allowlisted. These were lists until 2026-07-19 and
      # crashed every `/afk` and `/go` boot. Do not convert them back
      # without re-testing `red-skills-dev run --boot-only`.
      # ----------------------------------------------------------------
      hooks:

        # --- pre_pick: filter + reorder the issue queue -----------------
        # Runs once per drain, before any attempt is spent. Drop issues
        # that the harness shouldn't burn cycles on:
        #   * `do-not-pick` (manual hold)
        #   * any `blocked:external` (waiting on a third party)
        #   * issues missing `size:*` or `priority:*` (un-triaged)
        # Reorder by `priority:*` ascending (P0 first). Defensive:
        # a broken pre_pick must NOT starve the AFK, so the script
        # returns the original queue on parse/gh failure.
        pre_pick: scripts/afk-pre-pick.sh

        # --- pre_attempt: inject house-style + boundary reminder -------
        # Cheaper than `--request -r` on every /afk invocation. Runs
        # before EACH attempt (so the reminder survives iteration).
        # `--request -r "..."` is still appended after this, so users
        # retain per-run overrides.
        pre_attempt: scripts/afk-pre-attempt.sh

        # --- pre_merge: drift-guard (HARD GATE) ------------------------
        # Reject the merge BEFORE CI burns a round on it. Checks:
        #   1. Scope drift    — > 25 files changed.
        #   2. Per-file drift — single file +> 600 lines.
        #   3. Protected paths — docs/conformance, contract matrix,
        #                        .red/adr/. CODEOWNERS already enforces
        #                        this; this is the local fast-fail.
        #   4. New `.unwrap()` in non-allowlisted files (ratchet, ADR 0056).
        #   5. New Cargo dep without `# track: issue-XXXX` comment.
        # Thresholds are conservative on purpose — see ADR 0062 for
        # the rationale and the tuning policy.
        pre_merge: scripts/afk-pre-merge.sh

        # --- post_merge: notifier --------------------------------------
        # Optional Slack-style hook. Disabled by default (no URL set);
        # uncomment and set REDDB_MERGE_HOOK_URL to enable. A broken
        # notifier only logs (post_* non-zero is non-fatal by design).
        # post_merge:
        #   - 'curl -sS -m 5 -X POST "$REDDB_MERGE_HOOK_URL" -H content-type:application/json -d "{\"sha\":\"$RED_AFK_MERGE_SHA\",\"issue\":$RED_AFK_ISSUE_NUMBER}" || true'

        # --- on_idle: maintenance between drains ------------------------
        # Prune worktrees that no longer have a branch attached, and
        # delete orphan afk/* branches. Defaults (cargo/gradle) handle
        # build-dir cleanup; this is git-state cleanup.
        on_idle: |
          git worktree prune
          git branch --list 'afk/*' | while read -r br; do
            [ -z "$br" ] && continue
            git worktree list --porcelain \
              | grep -qF "  $br" \
              || git branch -D "$br"
          done

        # --- defaults ---------------------------------------------------
        # Built-in defaults the harness ships with. Each can be turned
        # off individually; you cannot reorder them. Keep cargo
        # isolation on for this repo (Rust workspace).
        defaults:
          cargo: true             # isolate CARGO_TARGET_DIR per slot in pre_worktree
          gradle: true            # ship when GRADLE_USER_HOME_BASE is set (no-op here)
          heartbeat: true         # post_attempt heartbeat
          envelope: true          # post_attempt envelope shaping
          validation: true       # post_merge validation report
