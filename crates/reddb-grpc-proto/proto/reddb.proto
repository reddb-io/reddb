syntax = "proto3";

package reddb.v1;

service RedDb {
  rpc Health(Empty) returns (HealthReply);
  rpc Ready(Empty) returns (HealthReply);
  rpc Stats(Empty) returns (StatsReply);
  rpc Collections(Empty) returns (CollectionsReply);
  rpc CatalogReadiness(Empty) returns (PayloadReply);
  rpc DeploymentProfiles(DeploymentProfileRequest) returns (PayloadReply);
  rpc CollectionReadiness(Empty) returns (PayloadReply);
  rpc CollectionAttention(Empty) returns (PayloadReply);
  rpc CatalogAttentionSummary(Empty) returns (PayloadReply);
  rpc CatalogConsistency(Empty) returns (PayloadReply);
  rpc ServerlessAttach(JsonPayloadRequest) returns (PayloadReply);
  rpc ServerlessWarmup(JsonPayloadRequest) returns (PayloadReply);
  rpc ServerlessReclaim(JsonPayloadRequest) returns (PayloadReply);
  rpc DeclaredIndexes(CollectionRequest) returns (PayloadReply);
  rpc OperationalIndexes(CollectionRequest) returns (PayloadReply);
  rpc IndexStatuses(Empty) returns (PayloadReply);
  rpc IndexAttention(Empty) returns (PayloadReply);
  rpc DeclaredGraphProjections(Empty) returns (PayloadReply);
  rpc OperationalGraphProjections(Empty) returns (PayloadReply);
  rpc GraphProjectionStatuses(Empty) returns (PayloadReply);
  rpc GraphProjectionAttention(Empty) returns (PayloadReply);
  rpc DeclaredAnalyticsJobs(Empty) returns (PayloadReply);
  rpc OperationalAnalyticsJobs(Empty) returns (PayloadReply);
  rpc AnalyticsJobStatuses(Empty) returns (PayloadReply);
  rpc AnalyticsJobAttention(Empty) returns (PayloadReply);
  rpc PhysicalMetadata(Empty) returns (PayloadReply);
  rpc NativeHeader(Empty) returns (PayloadReply);
  rpc NativeCollectionRoots(Empty) returns (PayloadReply);
  rpc NativeManifestSummary(Empty) returns (PayloadReply);
  rpc NativeRegistrySummary(Empty) returns (PayloadReply);
  rpc NativeRecoverySummary(Empty) returns (PayloadReply);
  rpc NativeCatalogSummary(Empty) returns (PayloadReply);
  rpc NativeMetadataStateSummary(Empty) returns (PayloadReply);
  rpc PhysicalAuthority(Empty) returns (PayloadReply);
  rpc NativePhysicalState(Empty) returns (PayloadReply);
  rpc NativeVectorArtifacts(Empty) returns (PayloadReply);
  rpc InspectNativeVectorArtifacts(Empty) returns (PayloadReply);
  rpc InspectNativeVectorArtifact(CollectionRequest) returns (PayloadReply);
  rpc NativeHeaderRepairPolicy(Empty) returns (PayloadReply);
  rpc RepairNativeHeader(Empty) returns (OperationReply);
  rpc WarmupNativeVectorArtifacts(Empty) returns (PayloadReply);
  rpc WarmupNativeVectorArtifact(CollectionRequest) returns (PayloadReply);
  rpc RepairNativePhysicalState(Empty) returns (OperationReply);
  rpc RebuildPhysicalMetadata(Empty) returns (OperationReply);
  rpc Manifest(ManifestRequest) returns (PayloadReply);
  rpc Roots(Empty) returns (PayloadReply);
  rpc Snapshots(Empty) returns (PayloadReply);
  rpc Exports(Empty) returns (PayloadReply);
  rpc Indexes(CollectionRequest) returns (PayloadReply);
  rpc SetIndexEnabled(IndexToggleRequest) returns (PayloadReply);
  rpc MarkIndexBuilding(IndexNameRequest) returns (PayloadReply);
  rpc MarkIndexReady(IndexNameRequest) returns (PayloadReply);
  rpc FailIndex(IndexNameRequest) returns (PayloadReply);
  rpc MarkIndexStale(IndexNameRequest) returns (PayloadReply);
  rpc WarmupIndex(IndexNameRequest) returns (PayloadReply);
  rpc RebuildIndexes(CollectionRequest) returns (PayloadReply);
  rpc GraphProjections(Empty) returns (PayloadReply);
  rpc SaveGraphProjection(GraphProjectionUpsertRequest) returns (PayloadReply);
  rpc SaveAnalyticsJob(JsonPayloadRequest) returns (PayloadReply);
  rpc QueueAnalyticsJob(JsonPayloadRequest) returns (PayloadReply);
  rpc StartAnalyticsJob(JsonPayloadRequest) returns (PayloadReply);
  rpc CompleteAnalyticsJob(JsonPayloadRequest) returns (PayloadReply);
  rpc MarkAnalyticsJobStale(JsonPayloadRequest) returns (PayloadReply);
  rpc FailAnalyticsJob(JsonPayloadRequest) returns (PayloadReply);
  rpc MaterializeGraphProjection(IndexNameRequest) returns (PayloadReply);
  rpc MarkGraphProjectionMaterializing(IndexNameRequest) returns (PayloadReply);
  rpc MarkGraphProjectionStale(IndexNameRequest) returns (PayloadReply);
  rpc FailGraphProjection(IndexNameRequest) returns (PayloadReply);
  rpc AnalyticsJobs(Empty) returns (PayloadReply);
  rpc Scan(ScanRequest) returns (ScanReply);
  rpc ExplainQuery(QueryRequest) returns (PayloadReply);
  rpc Query(QueryRequest) returns (QueryReply);
  rpc BatchQuery(BatchQueryRequest) returns (BatchQueryReply);
  rpc PrepareQuery(PrepareQueryRequest) returns (PrepareQueryReply);
  rpc ExecutePrepared(ExecutePreparedRequest) returns (QueryReply);
  rpc Search(JsonPayloadRequest) returns (PayloadReply);
  rpc TextSearch(JsonPayloadRequest) returns (PayloadReply);
  rpc MultimodalSearch(JsonPayloadRequest) returns (PayloadReply);
  rpc HybridSearch(JsonPayloadRequest) returns (PayloadReply);
  rpc ContextSearch(JsonPayloadRequest) returns (PayloadReply);
  rpc Similar(JsonCreateRequest) returns (PayloadReply);
  rpc IvfSearch(JsonCreateRequest) returns (PayloadReply);
  rpc GraphNeighborhood(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphTraverse(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphShortestPath(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphComponents(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphCentrality(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphCommunity(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphClustering(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphPersonalizedPagerank(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphHits(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphCycles(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphTopologicalSort(JsonPayloadRequest) returns (PayloadReply);
  rpc CreateRow(JsonCreateRequest) returns (EntityReply);
  rpc CreateNode(JsonCreateRequest) returns (EntityReply);
  rpc CreateEdge(JsonCreateRequest) returns (EntityReply);
  rpc CreateVector(JsonCreateRequest) returns (EntityReply);
  rpc CreateDocument(JsonCreateRequest) returns (EntityReply);
  rpc CreateKv(JsonCreateRequest) returns (EntityReply);
  rpc KvWatch(KvWatchRequest) returns (stream KvWatchEvent);
  rpc BulkCreateRows(JsonBulkCreateRequest) returns (BulkEntityReply);
  // Binary bulk insert — zero JSON, zero parse. Like PostgreSQL COPY FROM.
  rpc BulkInsertBinary(BinaryBulkInsertRequest) returns (BulkInsertReply);
  // Analytics BatchInsertEndpoint (issue #586, slice 5 of #575). Client
  // streams `BatchInsertChunk` rows; the first chunk MUST carry the
  // collection. Initial-metadata `idempotency-key` (lowercase, gRPC
  // convention) flips dedup against the process-wide cache that is
  // shared with the HTTP (#582) and RedWire (#587) mirrors.
  rpc BatchInsert(stream BatchInsertChunk) returns (BatchInsertReply);
  rpc BulkCreateNodes(JsonBulkCreateRequest) returns (BulkEntityReply);
  rpc BulkCreateEdges(JsonBulkCreateRequest) returns (BulkEntityReply);
  rpc BulkCreateVectors(JsonBulkCreateRequest) returns (BulkEntityReply);
  rpc BulkCreateDocuments(JsonBulkCreateRequest) returns (BulkEntityReply);
  rpc Ask(AskRequest) returns (AskReply);
  rpc AskStream(AskRequest) returns (stream AskStreamEvent);
  rpc Embeddings(JsonPayloadRequest) returns (PayloadReply);
  rpc AiPrompt(JsonPayloadRequest) returns (PayloadReply);
  rpc AiCredentials(JsonPayloadRequest) returns (PayloadReply);
  rpc PatchEntity(UpdateEntityRequest) returns (EntityReply);
  rpc CreateSnapshot(Empty) returns (PayloadReply);
  rpc CreateExport(ExportRequest) returns (PayloadReply);
  rpc ApplyRetention(Empty) returns (OperationReply);
  rpc DeleteEntity(DeleteEntityRequest) returns (OperationReply);
  rpc Checkpoint(Empty) returns (OperationReply);

  // Cluster topology (issue #166, ADR 0008). Carries the canonical
  // version-tagged Topology bytes produced by the shared encoder in
  // `reddb_wire::topology` — same bytes the RedWire HelloAck embeds
  // base64-wrapped. Distinct from the human-readable
  // ReplicationStatus observability endpoint below.
  rpc Topology(TopologyRequest) returns (TopologyReply);

  // Replication
  rpc ReplicationStatus(Empty) returns (PayloadReply);
  rpc PullWalRecords(JsonPayloadRequest) returns (PayloadReply);
  rpc ReplicationSnapshot(Empty) returns (PayloadReply);
  // Replica-to-primary ASK side effects. Initial commands:
  // {"command":"ask.side_effects.v1", "usage": {...}, "audit_row": {...}}
  // and {"command":"ask.cache_put.v1", "cache_entry": {...}}.
  // The primary ACKs only after applying the submitted side effects.
  rpc SubmitAskSideEffects(JsonPayloadRequest) returns (PayloadReply);
  // Replica-driven LSN ack (PLAN.md Phase 11.4). JSON payload:
  // {"replica_id": "...", "applied_lsn": <u64>, "durable_lsn": <u64>}.
  // Idempotent — older LSNs are ignored. Updates per-replica state
  // (last_acked_lsn, last_durable_lsn, last_seen_at_unix_ms) for
  // /metrics + /admin/status.
  rpc AckReplicaLsn(JsonPayloadRequest) returns (PayloadReply);

  // DDL
  rpc CreateCollection(JsonPayloadRequest) returns (PayloadReply);
  rpc DropCollection(JsonPayloadRequest) returns (OperationReply);
  rpc DescribeCollection(CollectionRequest) returns (PayloadReply);

  // Auth
  rpc AuthBootstrap(JsonPayloadRequest) returns (PayloadReply);
  rpc AuthLogin(JsonPayloadRequest) returns (PayloadReply);
  rpc AuthCreateUser(JsonPayloadRequest) returns (PayloadReply);
  rpc AuthDeleteUser(JsonPayloadRequest) returns (PayloadReply);
  rpc AuthListUsers(Empty) returns (PayloadReply);
  rpc AuthCreateApiKey(JsonPayloadRequest) returns (PayloadReply);
  rpc AuthRevokeApiKey(JsonPayloadRequest) returns (PayloadReply);
  rpc AuthChangePassword(JsonPayloadRequest) returns (PayloadReply);
  rpc AuthWhoAmI(Empty) returns (PayloadReply);
}

message Empty {}

message DeploymentProfileRequest {
  string profile = 1;
}

message HealthReply {
  bool healthy = 1;
  string state = 2;
  uint64 checked_at_unix_ms = 3;
}

message StatsReply {
  uint64 collection_count = 1;
  uint64 total_entities = 2;
  uint64 total_memory_bytes = 3;
  uint64 cross_ref_count = 4;
  uint64 active_connections = 5;
  uint64 idle_connections = 6;
  uint64 total_checkouts = 7;
  bool paged_mode = 8;
  uint64 started_at_unix_ms = 9;
}

message CollectionsReply {
  repeated string collections = 1;
}

message CollectionRequest {
  string collection = 1;
  string artifact_kind = 2;
}

message IndexNameRequest {
  string name = 1;
}

message IndexToggleRequest {
  string name = 1;
  bool enabled = 2;
}

message ManifestRequest {
  string collection = 1;
  string kind = 2;
  optional uint64 since_snapshot = 3;
}

message ScanRequest {
  string collection = 1;
  uint64 offset = 2;
  uint64 limit = 3;
}

message ScanEntity {
  uint64 id = 1;
  string kind = 2;
  string collection = 3;
  string json = 4;
}

message ScanReply {
  string collection = 1;
  uint64 total = 2;
  optional uint64 next_offset = 3;
  repeated ScanEntity items = 4;
}

message QueryRequest {
  string query = 1;
  repeated string entity_types = 2;
  repeated string capabilities = 3;
  repeated QueryValue params = 4;
}

message QueryValue {
  oneof kind {
    QueryNull null_value = 1;
    bool bool_value = 2;
    int64 int_value = 3;
    double float_value = 4;
    string text_value = 5;
    bytes bytes_value = 6;
    QueryVector vector_value = 7;
    string json_value = 8;
    int64 timestamp_value = 9;
    bytes uuid_value = 10;
  }
}

message QueryNull {}

message QueryVector {
  repeated float values = 1;
}

message JsonPayloadRequest {
  string payload_json = 1;
}

message JsonCreateRequest {
  string collection = 1;
  string payload_json = 2;
}

message JsonBulkCreateRequest {
  string collection = 1;
  repeated string payload_json = 2;
}

message UpdateEntityRequest {
  string collection = 1;
  uint64 id = 2;
  string payload_json = 3;
}

message DeleteEntityRequest {
  string collection = 1;
  uint64 id = 2;
}

message ExportRequest {
  string name = 1;
}

message GraphProjectionUpsertRequest {
  string name = 1;
  string source = 2;
  repeated string node_labels = 3;
  repeated string node_types = 4;
  repeated string edge_labels = 5;
}

message QueryReply {
  bool ok = 1;
  string mode = 2;
  string statement = 3;
  string engine = 4;
  repeated string columns = 5;
  uint64 record_count = 6;
  string result_json = 7;
}

message AskRequest {
  string question = 1;
  optional string provider = 2;
  optional string model = 3;
  optional uint32 depth = 4;
  optional uint32 limit = 5;
  optional float min_score = 6;
  optional string collection = 7;
  optional float temperature = 8;
  optional uint64 seed = 9;
  optional bool strict = 10;
}

message AskReply {
  string answer = 1;
  string sources_flat_json = 2;
  repeated Citation citations = 3;
  Validation validation = 4;
  string provider = 5;
  string model = 6;
  uint32 prompt_tokens = 7;
  uint32 completion_tokens = 8;
  double cost_usd = 9;
  bool cache_hit = 10;
  string mode = 11;
  uint32 retry_count = 12;
}

message AskStreamEvent {
  oneof event {
    AskSources sources = 1;
    AskAnswerToken answer_token = 2;
    Validation validation = 3;
    AskStreamError error = 4;
  }
}

message AskSources {
  string sources_flat_json = 1;
}

message AskAnswerToken {
  string text = 1;
}

message AskStreamError {
  uint32 code = 1;
  string message = 2;
}

message Citation {
  uint32 marker = 1;
  string urn = 2;
}

message Validation {
  bool ok = 1;
  repeated ValidationItem warnings = 2;
  repeated ValidationItem errors = 3;
}

message ValidationItem {
  string kind = 1;
  string detail = 2;
}

message BatchQueryRequest {
  repeated string queries = 1;
}

message BatchQueryReply {
  repeated QueryReply results = 1;
}

message PrepareQueryRequest {
  string query = 1;
}

message PrepareQueryReply {
  uint64 prepared_id = 1;
  uint32 parameter_count = 2;
}

message ExecutePreparedRequest {
  uint64 prepared_id = 1;
  // Each element is a JSON-encoded value literal: "42", "\"alice\"", "null"
  repeated string bind_json = 2;
}

message EntityReply {
  bool ok = 1;
  uint64 id = 2;
  string entity_json = 3;
}

message KvWatchRequest {
  string collection = 1;
  string key = 2;
  uint64 from_lsn = 3;
}

message KvWatchEvent {
  string key = 1;
  string op = 2;
  string before_json = 3;
  string after_json = 4;
  uint64 lsn = 5;
  uint64 committed_at = 6;
  uint64 dropped_event_count = 7;
}

message BulkEntityReply {
  bool ok = 1;
  uint64 count = 2;
  repeated EntityReply items = 3;
}

message PayloadReply {
  bool ok = 1;
  string payload = 2;
}

message OperationReply {
  bool ok = 1;
  string message = 2;
}

// Binary bulk insert — zero JSON overhead. Each BinaryRow has typed values
// sent as protobuf native types (no string serialization/parsing).
message BinaryBulkInsertRequest {
  string collection = 1;
  repeated string field_names = 2;  // column names (sent once for all rows)
  repeated BinaryRow rows = 3;
}

message BinaryRow {
  repeated BinaryValue values = 1;
}

message BinaryValue {
  oneof kind {
    string text_value = 1;
    int64 int_value = 2;
    double float_value = 3;
    bool bool_value = 4;
    bytes blob_value = 5;
  }
  // absence of any field = null
}

message BulkInsertReply {
  bool ok = 1;
  uint64 count = 2;
  uint64 first_id = 3;
}

// One row in a BatchInsert client stream. The first chunk MUST set
// `collection`; subsequent chunks MAY leave it empty (the server pins
// the collection from the first chunk and one stream = one batch =
// one collection). `row_json` mirrors the HTTP slice 4 row envelope
// `{"fields":{...}}` verbatim so the shared `process_batch_insert`
// pipeline parses it identically across all three transports.
message BatchInsertChunk {
  string collection = 1;
  string row_json = 2;
}

// Reply for a successful BatchInsert stream. On row-level failures
// (parse / schema / oversize) the server returns a `tonic::Status`
// error instead — `RESOURCE_EXHAUSTED` for oversize, otherwise
// `FAILED_PRECONDITION` with the `x-row-index` and `x-batch-error-code`
// trailing metadata set so the caller can pinpoint the broken row
// without re-parsing the message text.
message BatchInsertReply {
  bool ok = 1;
  uint64 count = 2;
}

// Topology RPC (#166). The canonical, version-tagged byte string is
// produced by the shared encoder in `reddb_wire::topology` and
// carried verbatim in `topology_bytes`. Schema evolution rule: new
// optional fields are added inside the version-tagged body, NOT as
// new protobuf fields, so the wire shape stays identical to the
// HelloAck-embedded form. See ADR 0008 §4.
message TopologyRequest {}

message TopologyReply {
  bytes topology_bytes = 1;
}
