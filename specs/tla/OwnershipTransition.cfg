\* Bounded TLC model for range ownership transitions.
\*
\* Runnable locally after fetching tla2tools.jar:
\*
\*   java -cp tools/tla2tools.jar tlc2.TLC -deadlock \
\*     -config OwnershipTransition.cfg OwnershipTransition.tla
\*
\* The bounds keep CI small while still covering normal promotion,
\* cooperative handoff, crash failover, forced transition, lease expiry,
\* recovery truncation, and one acknowledged write per range.
CONSTANTS
    Nodes = {n1, n2, n3}
    Ranges = {r1}
    MaxEpoch = 2
    MaxLogLen = 1

SPECIFICATION Spec

INVARIANT TypeOK
INVARIANT SingleOwnerPerEpoch
INVARIANT NoAcknowledgedWriteLoss
