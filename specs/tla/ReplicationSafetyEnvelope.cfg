\* Bounded TLC model for RedDB's replication safety envelope.
\*
\* Runnable locally after fetching tla2tools.jar:
\*
\*   java -cp tools/tla2tools.jar tlc2.TLC -deadlock \
\*     -config ReplicationSafetyEnvelope.cfg ReplicationSafetyEnvelope.tla
\*
\* The bounds keep the state space small enough for AFK/CI runs while still
\* covering quorum overlap, one failover term, one committed write,
\* crash/restart/recovery transitions, and one-sided partitions.
CONSTANTS
    Nodes = {n1, n2, n3}
    MaxTerm = 2
    MaxLogLen = 1

SPECIFICATION Spec

CONSTRAINT OneSidedPartitionBound

INVARIANT TypeOK
INVARIANT SingleWriterPerTerm
INVARIANT FencedLeaderCannotAcceptWrites
INVARIANT CommittedWritesSurviveRecovery
