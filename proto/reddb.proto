syntax = "proto3";

package reddb.v1;

service RedDb {
  rpc Health(Empty) returns (HealthReply);
  rpc Ready(Empty) returns (HealthReply);
  rpc Stats(Empty) returns (StatsReply);
  rpc Collections(Empty) returns (CollectionsReply);
  rpc CatalogConsistency(Empty) returns (PayloadReply);
  rpc DeclaredIndexes(CollectionRequest) returns (PayloadReply);
  rpc OperationalIndexes(CollectionRequest) returns (PayloadReply);
  rpc DeclaredGraphProjections(Empty) returns (PayloadReply);
  rpc OperationalGraphProjections(Empty) returns (PayloadReply);
  rpc DeclaredAnalyticsJobs(Empty) returns (PayloadReply);
  rpc OperationalAnalyticsJobs(Empty) returns (PayloadReply);
  rpc PhysicalMetadata(Empty) returns (PayloadReply);
  rpc NativeHeader(Empty) returns (PayloadReply);
  rpc NativeCollectionRoots(Empty) returns (PayloadReply);
  rpc NativeManifestSummary(Empty) returns (PayloadReply);
  rpc NativeRegistrySummary(Empty) returns (PayloadReply);
  rpc NativeRecoverySummary(Empty) returns (PayloadReply);
  rpc NativeCatalogSummary(Empty) returns (PayloadReply);
  rpc NativeMetadataStateSummary(Empty) returns (PayloadReply);
  rpc PhysicalAuthority(Empty) returns (PayloadReply);
  rpc NativePhysicalState(Empty) returns (PayloadReply);
  rpc NativeVectorArtifacts(Empty) returns (PayloadReply);
  rpc InspectNativeVectorArtifacts(Empty) returns (PayloadReply);
  rpc InspectNativeVectorArtifact(CollectionRequest) returns (PayloadReply);
  rpc NativeHeaderRepairPolicy(Empty) returns (PayloadReply);
  rpc RepairNativeHeader(Empty) returns (OperationReply);
  rpc WarmupNativeVectorArtifacts(Empty) returns (PayloadReply);
  rpc WarmupNativeVectorArtifact(CollectionRequest) returns (PayloadReply);
  rpc RepairNativePhysicalState(Empty) returns (OperationReply);
  rpc RebuildPhysicalMetadata(Empty) returns (OperationReply);
  rpc Manifest(ManifestRequest) returns (PayloadReply);
  rpc Roots(Empty) returns (PayloadReply);
  rpc Snapshots(Empty) returns (PayloadReply);
  rpc Exports(Empty) returns (PayloadReply);
  rpc Indexes(CollectionRequest) returns (PayloadReply);
  rpc SetIndexEnabled(IndexToggleRequest) returns (PayloadReply);
  rpc WarmupIndex(IndexNameRequest) returns (PayloadReply);
  rpc RebuildIndexes(CollectionRequest) returns (PayloadReply);
  rpc GraphProjections(Empty) returns (PayloadReply);
  rpc SaveGraphProjection(GraphProjectionUpsertRequest) returns (PayloadReply);
  rpc AnalyticsJobs(Empty) returns (PayloadReply);
  rpc Scan(ScanRequest) returns (ScanReply);
  rpc Query(QueryRequest) returns (QueryReply);
  rpc TextSearch(JsonPayloadRequest) returns (PayloadReply);
  rpc HybridSearch(JsonPayloadRequest) returns (PayloadReply);
  rpc Similar(JsonCreateRequest) returns (PayloadReply);
  rpc IvfSearch(JsonCreateRequest) returns (PayloadReply);
  rpc GraphNeighborhood(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphTraverse(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphShortestPath(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphComponents(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphCentrality(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphCommunity(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphClustering(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphPersonalizedPagerank(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphHits(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphCycles(JsonPayloadRequest) returns (PayloadReply);
  rpc GraphTopologicalSort(JsonPayloadRequest) returns (PayloadReply);
  rpc CreateRow(JsonCreateRequest) returns (EntityReply);
  rpc CreateNode(JsonCreateRequest) returns (EntityReply);
  rpc CreateEdge(JsonCreateRequest) returns (EntityReply);
  rpc CreateVector(JsonCreateRequest) returns (EntityReply);
  rpc BulkCreateRows(JsonBulkCreateRequest) returns (BulkEntityReply);
  rpc BulkCreateNodes(JsonBulkCreateRequest) returns (BulkEntityReply);
  rpc BulkCreateEdges(JsonBulkCreateRequest) returns (BulkEntityReply);
  rpc BulkCreateVectors(JsonBulkCreateRequest) returns (BulkEntityReply);
  rpc PatchEntity(UpdateEntityRequest) returns (EntityReply);
  rpc CreateSnapshot(Empty) returns (PayloadReply);
  rpc CreateExport(ExportRequest) returns (PayloadReply);
  rpc ApplyRetention(Empty) returns (OperationReply);
  rpc DeleteEntity(DeleteEntityRequest) returns (OperationReply);
  rpc Checkpoint(Empty) returns (OperationReply);
}

message Empty {}

message HealthReply {
  bool healthy = 1;
  string state = 2;
  uint64 checked_at_unix_ms = 3;
}

message StatsReply {
  uint64 collection_count = 1;
  uint64 total_entities = 2;
  uint64 total_memory_bytes = 3;
  uint64 cross_ref_count = 4;
  uint64 active_connections = 5;
  uint64 idle_connections = 6;
  uint64 total_checkouts = 7;
  bool paged_mode = 8;
  uint64 started_at_unix_ms = 9;
}

message CollectionsReply {
  repeated string collections = 1;
}

message CollectionRequest {
  string collection = 1;
  string artifact_kind = 2;
}

message IndexNameRequest {
  string name = 1;
}

message IndexToggleRequest {
  string name = 1;
  bool enabled = 2;
}

message ManifestRequest {
  string collection = 1;
  string kind = 2;
  optional uint64 since_snapshot = 3;
}

message ScanRequest {
  string collection = 1;
  uint64 offset = 2;
  uint64 limit = 3;
}

message ScanEntity {
  uint64 id = 1;
  string kind = 2;
  string collection = 3;
  string json = 4;
}

message ScanReply {
  string collection = 1;
  uint64 total = 2;
  optional uint64 next_offset = 3;
  repeated ScanEntity items = 4;
}

message QueryRequest {
  string query = 1;
}

message JsonPayloadRequest {
  string payload_json = 1;
}

message JsonCreateRequest {
  string collection = 1;
  string payload_json = 2;
}

message JsonBulkCreateRequest {
  string collection = 1;
  repeated string payload_json = 2;
}

message UpdateEntityRequest {
  string collection = 1;
  uint64 id = 2;
  string payload_json = 3;
}

message DeleteEntityRequest {
  string collection = 1;
  uint64 id = 2;
}

message ExportRequest {
  string name = 1;
}

message GraphProjectionUpsertRequest {
  string name = 1;
  string source = 2;
  repeated string node_labels = 3;
  repeated string node_types = 4;
  repeated string edge_labels = 5;
}

message QueryReply {
  bool ok = 1;
  string mode = 2;
  string statement = 3;
  string engine = 4;
  repeated string columns = 5;
  uint64 record_count = 6;
  string result_json = 7;
}

message EntityReply {
  bool ok = 1;
  uint64 id = 2;
  string entity_json = 3;
}

message BulkEntityReply {
  bool ok = 1;
  uint64 count = 2;
  repeated EntityReply items = 3;
}

message PayloadReply {
  bool ok = 1;
  string payload = 2;
}

message OperationReply {
  bool ok = 1;
  string message = 2;
}
