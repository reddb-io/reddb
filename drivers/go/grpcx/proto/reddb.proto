syntax = "proto3";

package reddb.v1;

option go_package = "github.com/reddb-io/reddb-go/grpcx/proto;proto";

service RedDb {
  rpc Health(Empty) returns (HealthReply);
  rpc Query(QueryRequest) returns (QueryReply);
}

message Empty {}

message HealthReply {
  bool healthy = 1;
  string state = 2;
  uint64 checked_at_unix_ms = 3;
}

message QueryRequest {
  string query = 1;
  repeated string entity_types = 2;
  repeated string capabilities = 3;
  repeated QueryValue params = 4;
}

message QueryValue {
  oneof kind {
    QueryNull null_value = 1;
    bool bool_value = 2;
    int64 int_value = 3;
    double float_value = 4;
    string text_value = 5;
    bytes bytes_value = 6;
    QueryVector vector_value = 7;
    string json_value = 8;
    int64 timestamp_value = 9;
    bytes uuid_value = 10;
  }
}

message QueryNull {}

message QueryVector {
  repeated float values = 1;
}

message QueryReply {
  bool ok = 1;
  string mode = 2;
  string statement = 3;
  string engine = 4;
  repeated string columns = 5;
  uint64 record_count = 6;
  string result_json = 7;
}
