syntax = "proto3";

package reddb.v1;

option go_package = "github.com/reddb-io/reddb-go/grpcx/proto;proto";

service RedDb {
  rpc Health(Empty) returns (HealthReply);
  rpc Query(QueryRequest) returns (QueryReply);
  rpc Ask(AskRequest) returns (AskReply);
}

message Empty {}

message HealthReply {
  bool healthy = 1;
  string state = 2;
  uint64 checked_at_unix_ms = 3;
}

message QueryRequest {
  string query = 1;
  repeated string entity_types = 2;
  repeated string capabilities = 3;
  repeated QueryValue params = 4;
}

message QueryValue {
  oneof kind {
    QueryNull null_value = 1;
    bool bool_value = 2;
    int64 int_value = 3;
    double float_value = 4;
    string text_value = 5;
    bytes bytes_value = 6;
    QueryVector vector_value = 7;
    string json_value = 8;
    int64 timestamp_value = 9;
    bytes uuid_value = 10;
  }
}

message QueryNull {}

message QueryVector {
  repeated float values = 1;
}

message QueryReply {
  bool ok = 1;
  string mode = 2;
  string statement = 3;
  string engine = 4;
  repeated string columns = 5;
  uint64 record_count = 6;
  string result_json = 7;
}

message AskRequest {
  string question = 1;
  optional string provider = 2;
  optional string model = 3;
  optional uint32 depth = 4;
  optional uint32 limit = 5;
  optional float min_score = 6;
  optional string collection = 7;
  optional float temperature = 8;
  optional uint64 seed = 9;
  optional bool strict = 10;
}

message AskReply {
  string answer = 1;
  string sources_flat_json = 2;
  repeated Citation citations = 3;
  Validation validation = 4;
  string provider = 5;
  string model = 6;
  uint32 prompt_tokens = 7;
  uint32 completion_tokens = 8;
  double cost_usd = 9;
  bool cache_hit = 10;
  string mode = 11;
  uint32 retry_count = 12;
}

message Citation {
  uint32 marker = 1;
  string urn = 2;
}

message Validation {
  bool ok = 1;
  repeated ValidationItem warnings = 2;
  repeated ValidationItem errors = 3;
}

message ValidationItem {
  string kind = 1;
  string detail = 2;
}
