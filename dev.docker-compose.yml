services:
  minio:
    image: minio/minio:latest
    container_name: reddb-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: reddb-minio-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 1
        done
        /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin
        /usr/bin/mc mb --ignore-existing local/reddb-dev
        /usr/bin/mc anonymous set private local/reddb-dev

  primary:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REDDB_CARGO_FEATURES: backend-s3
    container_name: reddb-primary-dev
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "50051:50051"
      - "8080:8080"
    volumes:
      - primary-data:/data
    command:
      - "server"
      - "--path"
      - "/data/data.rdb"
      - "--role"
      - "primary"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    environment:
      RUST_LOG: info
      REDDB_REMOTE_BACKEND: s3
      REDDB_REMOTE_KEY: clusters/dev/data.rdb
      REDDB_S3_ENDPOINT: http://minio:9000
      REDDB_S3_BUCKET: reddb-dev
      REDDB_S3_REGION: us-east-1
      REDDB_S3_ACCESS_KEY: minioadmin
      REDDB_S3_SECRET_KEY: minioadmin
      REDDB_S3_KEY_PREFIX: reddb/
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  replica:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REDDB_CARGO_FEATURES: backend-s3
    container_name: reddb-replica-dev
    depends_on:
      primary:
        condition: service_healthy
    ports:
      - "50052:50051"
      - "8081:8080"
    volumes:
      - replica-data:/data
    command:
      - "replica"
      - "--primary-addr"
      - "http://primary:50051"
      - "--path"
      - "/data/data.rdb"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    environment:
      RUST_LOG: info
      REDDB_REMOTE_BACKEND: s3
      REDDB_REMOTE_KEY: clusters/dev/data.rdb
      REDDB_S3_ENDPOINT: http://minio:9000
      REDDB_S3_BUCKET: reddb-dev
      REDDB_S3_REGION: us-east-1
      REDDB_S3_ACCESS_KEY: minioadmin
      REDDB_S3_SECRET_KEY: minioadmin
      REDDB_S3_KEY_PREFIX: reddb/
      REDDB_PRIMARY_ADDR: http://primary:50051
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  minio-data:
  primary-data:
  replica-data:
