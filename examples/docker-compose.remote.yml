# Remote backend (S3 via Floci) demo. For the canonical secure deploy
# (vault on, cert via Docker secrets), see examples/docker-compose.vault.yml.

services:
  floci:
    image: floci/floci:latest
    container_name: reddb-floci
    ports:
      - "55466:4566"

  floci-init:
    image: amazon/aws-cli:2
    container_name: reddb-floci-init
    depends_on:
      - floci
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until aws --endpoint-url=http://floci:4566 s3 ls >/dev/null 2>&1; do
          sleep 1
        done
        aws --endpoint-url=http://floci:4566 s3 mb s3://reddb-dev || true

  primary:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        REDDB_CARGO_FEATURES: backend-s3
    container_name: reddb-primary-dev
    depends_on:
      floci-init:
        condition: service_completed_successfully
    ports:
      - "55551:50051"
      - "55880:8080"
    volumes:
      - primary-data:/data
    command:
      - "server"
      - "--path"
      - "/data/data.rdb"
      - "--role"
      - "primary"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    environment:
      RUST_LOG: info
      REDDB_TOPOLOGY: primary-replica
      REDDB_NODE_ROLE: primary
      REDDB_STORAGE_PRESET: primary-replica-production-ha
      REDDB_STORAGE_PROFILE: primary-replica
      REDDB_STORAGE_PACKAGING: operational-directory
      REDDB_REPLICA_COUNT: "1"
      RED_BACKEND: s3
      RED_REMOTE_KEY: clusters/dev/data.rdb
      RED_S3_ENDPOINT: http://floci:4566
      RED_S3_BUCKET: reddb-dev
      RED_S3_REGION: us-east-1
      RED_S3_ACCESS_KEY: test
      RED_S3_SECRET_KEY: test
      RED_S3_KEY_PREFIX: reddb/
      RED_S3_PATH_STYLE: "true"
      REDDB_CERTIFICATE_FILE: /run/secrets/reddb_certificate
    secrets:
      - source: reddb_certificate
        target: reddb_certificate
        uid: "10001"
        gid: "10001"
        mode: 0400
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  replica:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        REDDB_CARGO_FEATURES: backend-s3
    container_name: reddb-replica-dev
    depends_on:
      primary:
        condition: service_healthy
    ports:
      - "55552:50051"
      - "55881:8080"
    volumes:
      - replica-data:/data
    command:
      - "replica"
      - "--primary-addr"
      - "http://primary:50051"
      - "--path"
      - "/data/data.rdb"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    environment:
      RUST_LOG: info
      REDDB_TOPOLOGY: primary-replica
      REDDB_NODE_ROLE: replica
      REDDB_STORAGE_PRESET: primary-replica-production-ha
      REDDB_STORAGE_PROFILE: primary-replica
      REDDB_STORAGE_PACKAGING: operational-directory
      REDDB_REPLICA_COUNT: "1"
      RED_BACKEND: s3
      RED_REMOTE_KEY: clusters/dev/data.rdb
      RED_S3_ENDPOINT: http://floci:4566
      RED_S3_BUCKET: reddb-dev
      RED_S3_REGION: us-east-1
      RED_S3_ACCESS_KEY: test
      RED_S3_SECRET_KEY: test
      RED_S3_KEY_PREFIX: reddb/
      RED_S3_PATH_STYLE: "true"
      REDDB_PRIMARY_ADDR: http://primary:50051
      REDDB_CERTIFICATE_FILE: /run/secrets/reddb_certificate
    secrets:
      - source: reddb_certificate
        target: reddb_certificate
        uid: "10001"
        gid: "10001"
        mode: 0400
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

secrets:
  reddb_certificate:
    external: true

volumes:
  primary-data:
  replica-data:
