# Backup-to-S3 demo via Floci. For the canonical secure deploy (vault on,
# cert via Docker secrets), see examples/docker-compose.vault.yml.

services:
  floci:
    image: floci/floci:latest
    container_name: reddb-floci-backup
    ports:
      - "55476:4566"
    environment:
      FLOCI_HOSTNAME: floci

  floci-init:
    image: amazon/aws-cli:latest
    container_name: reddb-floci-backup-init
    depends_on:
      - floci
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until aws --endpoint-url=http://floci:4566 s3 ls >/dev/null 2>&1; do
          sleep 1
        done
        aws --endpoint-url=http://floci:4566 s3 mb s3://reddb-backup || true

  server:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        REDDB_CARGO_FEATURES: backend-s3
    container_name: reddb-backup-server
    depends_on:
      floci-init:
        condition: service_completed_successfully
    ports:
      - "5060:5050"
      - "55061:55055"
      - "5010:5000"
    volumes:
      - backup-server-data:/data
    environment:
      RUST_LOG: info
      REDDB_TOPOLOGY: primary-replica
      REDDB_NODE_ROLE: primary
      REDDB_STORAGE_PRESET: primary-replica-backup
      REDDB_STORAGE_PROFILE: primary-replica
      REDDB_STORAGE_PACKAGING: operational-directory
      REDDB_REPLICA_COUNT: "0"
      RED_BACKEND: s3
      RED_REMOTE_KEY: backups/demo/data.rdb
      RED_S3_ENDPOINT: http://floci:4566
      RED_S3_BUCKET: reddb-backup
      RED_S3_REGION: us-east-1
      RED_S3_ACCESS_KEY: test
      RED_S3_SECRET_KEY: test
      RED_S3_PATH_STYLE: "true"
      REDDB_VAULT: "false"
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:5000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  backup-server-data:
