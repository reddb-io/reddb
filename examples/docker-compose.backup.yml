# Backup-to-S3 demo via MinIO. For the canonical secure deploy (vault on,
# cert via Docker secrets), see examples/docker-compose.vault.yml.

services:
  minio:
    image: minio/minio:latest
    container_name: reddb-minio-backup
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio-backup-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: reddb-minio-backup-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 1
        done
        /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin
        /usr/bin/mc mb --ignore-existing local/reddb-backup
        /usr/bin/mc anonymous set private local/reddb-backup

  server:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        REDDB_CARGO_FEATURES: backend-s3
    container_name: reddb-backup-server
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "50061:50051"
      - "8090:8080"
    volumes:
      - backup-server-data:/data
    command:
      - "server"
      - "--path"
      - "/data/data.rdb"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    environment:
      RUST_LOG: info
      REDDB_REMOTE_BACKEND: s3
      REDDB_REMOTE_KEY: backups/demo/data.rdb
      REDDB_S3_ENDPOINT: http://minio:9000
      REDDB_S3_BUCKET: reddb-backup
      REDDB_S3_REGION: us-east-1
      REDDB_S3_ACCESS_KEY: minioadmin
      REDDB_S3_SECRET_KEY: minioadmin
      REDDB_CERTIFICATE_FILE: /run/secrets/reddb_certificate
    secrets:
      - source: reddb_certificate
        target: reddb_certificate
        uid: "10001"
        gid: "10001"
        mode: 0400
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

secrets:
  reddb_certificate:
    external: true

volumes:
  minio-backup-data:
  backup-server-data:
