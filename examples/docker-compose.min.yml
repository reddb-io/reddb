# Minimal single-node demo. Auth vault is OFF here for simplicity.
# For the canonical secure deploy (vault on, cert via Docker secrets),
# see examples/docker-compose.vault.yml.

services:
  server:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-server-min
    ports:
      - "5050:5050"
      - "55055:55055"
      - "5000:5000"
    volumes:
      - server-data:/data
    environment:
      RUST_LOG: info
      REDDB_TOPOLOGY: standalone
      REDDB_NODE_ROLE: standalone
      REDDB_STORAGE_PRESET: embedded
      REDDB_STORAGE_PROFILE: embedded
      REDDB_STORAGE_PACKAGING: single-file
      REDDB_REPLICA_COUNT: "0"
      REDDB_VAULT: "false"
      # Uncomment when promoting to vault mode:
      # REDDB_VAULT: "true"
      # REDDB_CERTIFICATE_FILE: /run/secrets/reddb_certificate
    # secrets:
    #   - source: reddb_certificate
    #     target: reddb_certificate
    #     uid: "10001"
    #     gid: "10001"
    #     mode: 0400
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:5000"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

# secrets:
#   reddb_certificate:
#     external: true

volumes:
  server-data:
