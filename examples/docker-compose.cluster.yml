# Symmetric cluster-shape demo. The same image command (`red server`) is used
# for every member; env supplies the cluster storage preset and stable
# identity/discovery contract.

x-reddb-cluster-env: &reddb-cluster-env
  RUST_LOG: info
  REDDB_TOPOLOGY: cluster
  REDDB_STORAGE_PRESET: cluster
  REDDB_STORAGE_PROFILE: cluster
  REDDB_STORAGE_PACKAGING: operational-directory
  REDDB_REPLICA_COUNT: "3"
  REDDB_VAULT: "false"
  RED_CLUSTER_HA_INTENT: declared
  REDDB_CLUSTER_PEERS: cluster-0:55055,cluster-1:55055,cluster-2:55055
  REDDB_CONFIG_FILE: /etc/reddb/config.json

services:
  cluster-0:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-cluster-0
    hostname: cluster-0
    ports:
      - "5100:5050"
      - "55150:55055"
      - "5020:5000"
    volumes:
      - cluster-0-data:/data
      - ./container-config.json:/etc/reddb/config.json:ro
    environment:
      <<: *reddb-cluster-env
      REDDB_NODE_ROLE: cluster-member
      REDDB_CLUSTER_NODE_ID: cluster-0
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:5000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  cluster-1:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-cluster-1
    hostname: cluster-1
    ports:
      - "5101:5050"
      - "55151:55055"
      - "5021:5000"
    volumes:
      - cluster-1-data:/data
      - ./container-config.json:/etc/reddb/config.json:ro
    environment:
      <<: *reddb-cluster-env
      REDDB_NODE_ROLE: cluster-member
      REDDB_CLUSTER_NODE_ID: cluster-1
    depends_on:
      cluster-0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:5000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  cluster-2:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-cluster-2
    hostname: cluster-2
    ports:
      - "5102:5050"
      - "55152:55055"
      - "5022:5000"
    volumes:
      - cluster-2-data:/data
      - ./container-config.json:/etc/reddb/config.json:ro
    environment:
      <<: *reddb-cluster-env
      REDDB_NODE_ROLE: cluster-member
      REDDB_CLUSTER_NODE_ID: cluster-2
    depends_on:
      cluster-0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:5000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  cluster-0-data:
  cluster-1-data:
  cluster-2-data:
