# ==========================================================================
# RedDB - Primary + Read-Replica test environment.
# For the canonical secure deploy (vault on, cert via Docker secrets),
# see examples/docker-compose.vault.yml.
# ==========================================================================

services:
  primary:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-primary
    ports:
      - "55551:50051"
      - "55880:8080"
    volumes:
      - primary-data:/data
      - ./container-config.json:/etc/reddb/config.json:ro
    command:
      - "server"
      - "--path"
      - "/data/data.rdb"
      - "--role"
      - "primary"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - RUST_LOG=info
      - REDDB_TOPOLOGY=primary-replica
      - REDDB_NODE_ROLE=primary
      - REDDB_STORAGE_PRESET=primary-replica-production-ha
      - REDDB_STORAGE_PROFILE=primary-replica
      - REDDB_STORAGE_PACKAGING=operational-directory
      - REDDB_REPLICA_COUNT=1
      - REDDB_CONFIG_FILE=/etc/reddb/config.json
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  replica:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-replica
    ports:
      - "55552:50051"
      - "55881:8080"
    volumes:
      - replica-data:/data
      - ./container-config.json:/etc/reddb/config.json:ro
    command:
      - "replica"
      - "--primary-addr"
      - "http://primary:50051"
      - "--path"
      - "/data/data.rdb"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - RUST_LOG=info
      - REDDB_TOPOLOGY=primary-replica
      - REDDB_NODE_ROLE=replica
      - REDDB_STORAGE_PRESET=primary-replica-production-ha
      - REDDB_STORAGE_PROFILE=primary-replica
      - REDDB_STORAGE_PACKAGING=operational-directory
      - REDDB_REPLICA_COUNT=1
      - REDDB_PRIMARY_ADDR=http://primary:50051
      - REDDB_CONFIG_FILE=/etc/reddb/config.json
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  primary-data:
  replica-data:
