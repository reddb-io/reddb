# Serverless-style local demo with MinIO. For the canonical secure deploy
# (vault on, cert via Docker secrets), see examples/docker-compose.vault.yml.

services:
  minio:
    image: minio/minio:latest
    container_name: reddb-minio-serverless
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9030:9000"
      - "9031:9001"
    volumes:
      - minio-serverless-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: reddb-minio-serverless-init
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin; do
          sleep 1
        done
        /usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin
        /usr/bin/mc mb --ignore-existing local/reddb-serverless
        /usr/bin/mc anonymous set private local/reddb-serverless

  serverless:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        REDDB_CARGO_FEATURES: backend-s3
    container_name: reddb-serverless
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "50081:50051"
      - "8110:8080"
    volumes:
      - serverless-data:/data
      - ./container-config.json:/etc/reddb/config.json:ro
    command:
      - "server"
      - "--path"
      - "/data/data.rdb"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    environment:
      RUST_LOG: info
      REDDB_TOPOLOGY: serverless
      REDDB_STORAGE_PRESET: serverless
      REDDB_STORAGE_PROFILE: serverless
      REDDB_CONFIG_FILE: /etc/reddb/config.json
      RED_BACKEND: s3
      RED_REMOTE_KEY: serverless/demo/data.rdb
      RED_S3_ENDPOINT: http://minio:9000
      RED_S3_BUCKET: reddb-serverless
      RED_S3_REGION: us-east-1
      RED_S3_ACCESS_KEY: minioadmin
      RED_S3_SECRET_KEY: minioadmin
      RED_AUTO_RESTORE: "true"
      RED_BACKUP_ON_SHUTDOWN: "true"
      RED_LEASE_REQUIRED: "true"
      RED_LEASE_TTL_SECS: "60"
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  minio-serverless-data:
  serverless-data:
