# Reference Kubernetes manifest for RedDB — secure-by-default.
# PLAN.md (cloud-agnostic) Phase 10 — operator can take this and run
# RedDB on any conformant Kubernetes (vanilla, EKS, GKE, AKS, OKE,
# DigitalOcean Kubernetes, Civo, Linode, Scaleway, k3s, OpenShift).
# Zero vendor SDK dependencies — every primitive is core Kubernetes.
#
# -----------------------------------------------------------------------------
# Bootstrap flow (one-time, per cluster)
# -----------------------------------------------------------------------------
#   1. Generate the vault certificate on a trusted machine:
#         red bootstrap \
#             --path ./scratch/data.rdb \
#             --vault \
#             --username admin \
#             --password-stdin \
#             --print-certificate \
#             --json > bootstrap.json
#         CERT=$(jq -r .certificate bootstrap.json)
#         # BACK THIS UP OFFLINE — there is no recovery if you lose it.
#
#   2. Create the K8s Secret holding the certificate:
#         kubectl create namespace reddb
#         kubectl -n reddb create secret generic reddb-vault \
#             --from-literal=certificate=$CERT
#         unset CERT
#
#   3. Apply this manifest:
#         kubectl -n reddb apply -f examples/kubernetes/reddb.yaml
# -----------------------------------------------------------------------------
---
apiVersion: v1
kind: Namespace
metadata:
  name: reddb
---
# Secret stub — DO NOT apply this section as-is. Create the Secret
# imperatively (see step 2 above) so the certificate never lands in
# a YAML file checked into version control.
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: reddb-vault
#   namespace: reddb
# type: Opaque
# stringData:
#   certificate: "<64-char hex from `red bootstrap --print-certificate`>"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: reddb-config
  namespace: reddb
data:
  RED_BACKEND: "none"
  RED_AUTO_RESTORE: "true"
  RED_BACKUP_ON_SHUTDOWN: "true"
  RED_BACKUP_INTERVAL_SECS: "300"
  RED_MAX_DB_SIZE_BYTES: "10737418240"
  RED_MAX_BATCH_SIZE: "10000"
  RED_MAX_QUERY_DURATION_MS: "30000"
  RED_MAX_RESULT_BYTES: "10485760"
  RED_SHUTDOWN_TIMEOUT_SECS: "60"
  RED_DRAIN_TIMEOUT_SECS: "30"
  RED_LOG_FORMAT: "json"
  RED_LOG_LEVEL: "info"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: reddb
  namespace: reddb
automountServiceAccountToken: false
---
apiVersion: v1
kind: Service
metadata:
  name: reddb
  namespace: reddb
  labels:
    app.kubernetes.io/name: reddb
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: reddb
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 50051
      targetPort: grpc
---
apiVersion: v1
kind: Service
metadata:
  name: reddb-headless
  namespace: reddb
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: reddb
  ports:
    - name: http
      port: 8080
      targetPort: http
    - name: grpc
      port: 50051
      targetPort: grpc
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: reddb
  namespace: reddb
  labels:
    app.kubernetes.io/name: reddb
spec:
  serviceName: reddb-headless
  replicas: 1
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app.kubernetes.io/name: reddb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: reddb
    spec:
      serviceAccountName: reddb
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 70
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reddb
          image: reddb-benchmark/reddb:latest   # replace with your registry
          imagePullPolicy: IfNotPresent
          args:
            - server
            - --vault
            - --path
            - /data/data.rdb
            - --grpc-bind
            - 0.0.0.0:50051
            - --http-bind
            - 0.0.0.0:8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
          envFrom:
            - configMapRef:
                name: reddb-config
          env:
            # Encrypted-vault key. The Secret is created out-of-band via
            # `kubectl create secret generic reddb-vault --from-literal=...`
            # so that the cert never appears in a checked-in YAML file.
            - name: REDDB_CERTIFICATE
              valueFrom:
                secretKeyRef:
                  name: reddb-vault
                  key: certificate
          startupProbe:
            httpGet:
              path: /health/startup
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            periodSeconds: 10
            failureThreshold: 6
          lifecycle:
            preStop:
              httpGet:
                path: /admin/drain
                port: http
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        # storageClassName: gp3
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: reddb
  namespace: reddb
  labels:
    app.kubernetes.io/name: reddb
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: reddb
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
