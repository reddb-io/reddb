# Primary + 2 replicas. For the canonical secure deploy (vault on,
# cert via Docker secrets), see examples/docker-compose.vault.yml.

services:
  primary:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-primary
    ports:
      - "5050:5050"
      - "55055:55055"
      - "5000:5000"
    environment:
      REDDB_TOPOLOGY: primary-replica
      REDDB_NODE_ROLE: primary
      REDDB_STORAGE_PRESET: primary-replica-production-ha
      REDDB_STORAGE_PROFILE: primary-replica
      REDDB_STORAGE_PACKAGING: operational-directory
      REDDB_REPLICA_COUNT: "2"
      REDDB_VAULT: "false"

  replica-1:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-replica-1
    ports:
      - "5051:5050"
      - "55056:55055"
      - "5001:5000"
    environment:
      REDDB_TOPOLOGY: primary-replica
      REDDB_NODE_ROLE: replica
      REDDB_STORAGE_PRESET: primary-replica-production-ha
      REDDB_STORAGE_PROFILE: primary-replica
      REDDB_STORAGE_PACKAGING: operational-directory
      REDDB_REPLICA_COUNT: "2"
      REDDB_PRIMARY_ADDR: http://primary:55055
      REDDB_VAULT: "false"
    depends_on:
      - primary

  replica-2:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-replica-2
    ports:
      - "5052:5050"
      - "55057:55055"
      - "5002:5000"
    environment:
      REDDB_TOPOLOGY: primary-replica
      REDDB_NODE_ROLE: replica
      REDDB_STORAGE_PRESET: primary-replica-production-ha
      REDDB_STORAGE_PROFILE: primary-replica
      REDDB_STORAGE_PACKAGING: operational-directory
      REDDB_REPLICA_COUNT: "2"
      REDDB_PRIMARY_ADDR: http://primary:55055
      REDDB_VAULT: "false"
    depends_on:
      - primary
