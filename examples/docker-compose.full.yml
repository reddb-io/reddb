# Primary + 2 replicas. For the canonical secure deploy (vault on,
# cert via Docker secrets), see examples/docker-compose.vault.yml.
# All three reddb services share the same vault certificate so they
# can decrypt each other's auth pages.

services:
  primary:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-primary
    ports:
      - "50051:50051"
      - "8080:8080"
    command:
      - "server"
      - "--role"
      - "primary"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    environment:
      REDDB_CERTIFICATE_FILE: /run/secrets/reddb_certificate
    secrets:
      - source: reddb_certificate
        target: reddb_certificate
        uid: "10001"
        gid: "10001"
        mode: 0400

  replica-1:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-replica-1
    ports:
      - "50052:50051"
      - "8081:8080"
    command:
      - "replica"
      - "--primary-addr"
      - "http://primary:50051"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    environment:
      REDDB_CERTIFICATE_FILE: /run/secrets/reddb_certificate
    secrets:
      - source: reddb_certificate
        target: reddb_certificate
        uid: "10001"
        gid: "10001"
        mode: 0400
    depends_on:
      - primary

  replica-2:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: reddb-replica-2
    ports:
      - "50053:50051"
      - "8082:8080"
    command:
      - "replica"
      - "--primary-addr"
      - "http://primary:50051"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    environment:
      REDDB_CERTIFICATE_FILE: /run/secrets/reddb_certificate
    secrets:
      - source: reddb_certificate
        target: reddb_certificate
        uid: "10001"
        gid: "10001"
        mode: 0400
    depends_on:
      - primary

secrets:
  reddb_certificate:
    external: true
