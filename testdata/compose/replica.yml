# ==========================================================================
# RedDB - Primary + Read-Replica test environment
# ==========================================================================

services:
  primary:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: reddb-primary
    ports:
      - "5050:5050"
      - "55055:55055"
      - "5000:5000"
      - "55555:55555"
    volumes:
      - primary-data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - RUST_LOG=info
      - REDDB_TOPOLOGY=primary-replica
      - REDDB_NODE_ROLE=primary
      - REDDB_STORAGE_PRESET=primary-replica-production-ha
      - REDDB_STORAGE_PROFILE=primary-replica
      - REDDB_STORAGE_PACKAGING=operational-directory
      - REDDB_REPLICA_COUNT=1
      - REDDB_VAULT=false
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:5000"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  replica:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: reddb-replica
    ports:
      - "5051:5050"
      - "55056:55055"
      - "5001:5000"
    volumes:
      - replica-data:/data
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - RUST_LOG=info
      - REDDB_TOPOLOGY=primary-replica
      - REDDB_NODE_ROLE=replica
      - REDDB_STORAGE_PRESET=primary-replica-production-ha
      - REDDB_STORAGE_PROFILE=primary-replica
      - REDDB_STORAGE_PACKAGING=operational-directory
      - REDDB_REPLICA_COUNT=1
      - REDDB_PRIMARY_ADDR=http://primary:55055
      - REDDB_VAULT=false
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:5000"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  primary-data:
  replica-data:
