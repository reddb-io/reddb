# ==========================================================================
# RedDB - Primary + Read-Replica test environment
# ==========================================================================

services:
  primary:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: reddb-primary
    ports:
      - "55551:50051"
      - "55880:8080"
      - "55843:8443"
    volumes:
      - primary-data:/data
    command:
      - "server"
      - "--path"
      - "/data/data.rdb"
      - "--role"
      - "primary"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
      - "--http-tls-bind"
      - "0.0.0.0:8443"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - RUST_LOG=info
      - RED_HTTP_TLS_DEV=1
      - REDDB_STORAGE_PRESET=primary-replica-production-ha
      - REDDB_STORAGE_PROFILE=primary-replica
      - REDDB_STORAGE_PACKAGING=operational-directory
      - REDDB_REPLICA_COUNT=1
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  replica:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: reddb-replica
    ports:
      - "55552:50051"
      - "55881:8080"
    volumes:
      - replica-data:/data
    command:
      - "replica"
      - "--primary-addr"
      - "http://primary:50051"
      - "--path"
      - "/data/data.rdb"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - RUST_LOG=info
      - REDDB_STORAGE_PRESET=primary-replica-production-ha
      - REDDB_STORAGE_PROFILE=primary-replica
      - REDDB_STORAGE_PACKAGING=operational-directory
      - REDDB_REPLICA_COUNT=1
      - REDDB_PRIMARY_ADDR=http://primary:50051
    depends_on:
      primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  primary-data:
  replica-data:
