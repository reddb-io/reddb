services:
  floci:
    image: floci/floci:latest
    container_name: reddb-floci-serverless
    ports:
      - "55496:4566"
    environment:
      FLOCI_HOSTNAME: floci

  floci-init:
    image: amazon/aws-cli:latest
    container_name: reddb-floci-serverless-init
    depends_on:
      - floci
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until aws --endpoint-url=http://floci:4566 s3 ls >/dev/null 2>&1; do
          sleep 1
        done
        aws --endpoint-url=http://floci:4566 s3 mb s3://reddb-serverless || true

  serverless:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        REDDB_CARGO_FEATURES: backend-s3
    container_name: reddb-serverless
    depends_on:
      floci-init:
        condition: service_completed_successfully
    ports:
      - "5080:5050"
      - "55081:55055"
      - "5030:5000"
      - "55581:55555"
    volumes:
      - serverless-data:/data
    environment:
      RUST_LOG: info
      REDDB_TOPOLOGY: serverless
      REDDB_NODE_ROLE: serverless
      REDDB_STORAGE_PRESET: serverless
      REDDB_STORAGE_PROFILE: serverless
      REDDB_STORAGE_PACKAGING: operational-directory
      REDDB_REPLICA_COUNT: "0"
      REDDB_VAULT: "false"
      RED_BACKEND: s3
      RED_REMOTE_KEY: serverless/demo/data.rdb
      RED_S3_ENDPOINT: http://floci:4566
      RED_S3_BUCKET: reddb-serverless
      RED_S3_REGION: us-east-1
      RED_S3_ACCESS_KEY: test
      RED_S3_SECRET_KEY: test
      RED_S3_PATH_STYLE: "true"
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:5000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  serverless-data:
