services:
  floci:
    image: floci/floci:latest
    container_name: reddb-floci-serverless
    ports:
      - "55466:4566"

  floci-init:
    image: amazon/aws-cli:2
    container_name: reddb-floci-serverless-init
    depends_on:
      - floci
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        until aws --endpoint-url=http://floci:4566 s3 ls >/dev/null 2>&1; do
          sleep 1
        done
        aws --endpoint-url=http://floci:4566 s3 mb s3://reddb-serverless || true

  serverless:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        REDDB_CARGO_FEATURES: backend-s3
    container_name: reddb-serverless
    depends_on:
      floci-init:
        condition: service_completed_successfully
    ports:
      - "55581:50051"
      - "55810:8080"
      - "55953:8443"
    volumes:
      - serverless-data:/data
    command:
      - "server"
      - "--path"
      - "/data/data.rdb"
      - "--grpc-bind"
      - "0.0.0.0:50051"
      - "--http-bind"
      - "0.0.0.0:8080"
      - "--http-tls-bind"
      - "0.0.0.0:8443"
    environment:
      RUST_LOG: info
      REDDB_STORAGE_PRESET: serverless
      REDDB_STORAGE_PROFILE: serverless
      REDDB_STORAGE_PACKAGING: operational-directory
      REDDB_REPLICA_COUNT: "0"
      RED_BACKEND: s3
      RED_REMOTE_KEY: serverless/demo/data.rdb
      RED_S3_ENDPOINT: http://floci:4566
      RED_S3_BUCKET: reddb-serverless
      RED_S3_REGION: us-east-1
      RED_S3_ACCESS_KEY: test
      RED_S3_SECRET_KEY: test
      RED_S3_PATH_STYLE: "true"
    healthcheck:
      test: ["CMD", "/usr/local/bin/red", "health", "--http", "--bind", "127.0.0.1:8080"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

volumes:
  serverless-data:
