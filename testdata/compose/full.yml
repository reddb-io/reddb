services:
  mock-ai:
    image: python:3.12-alpine
    container_name: reddb-mock-ai
    working_dir: /repo
    volumes:
      - ../..:/repo:ro
    environment:
      MOCK_AI_PROMPT_TOKENS: "1000"
      MOCK_AI_COMPLETION_TOKENS: "1000"
    command:
      - "python"
      - "tests/pgwire_clients/mock_ai.py"
      - "--listen"
      - "0.0.0.0:55436"

  primary:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: reddb-primary
    environment:
      REDDB_AI_PROVIDER: openai
      REDDB_OPENAI_API_BASE: http://mock-ai:55436/v1
      REDDB_OPENAI_API_KEY: test-key
      REDDB_OPENAI_PROMPT_MODEL: mock-chat
      REDDB_TOPOLOGY: primary-replica
      REDDB_NODE_ROLE: primary
      REDDB_STORAGE_PRESET: primary-replica-production-ha
      REDDB_STORAGE_PROFILE: primary-replica
      REDDB_STORAGE_PACKAGING: operational-directory
      REDDB_REPLICA_COUNT: "2"
      REDDB_VAULT: "false"
    ports:
      - "5050:5050"
      - "55055:55055"
      - "5000:5000"
      - "55555:55555"
    depends_on:
      - mock-ai

  replica-1:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: reddb-replica-1
    environment:
      REDDB_AI_PROVIDER: openai
      REDDB_OPENAI_API_BASE: http://mock-ai:55436/v1
      REDDB_OPENAI_API_KEY: test-key
      REDDB_OPENAI_PROMPT_MODEL: mock-chat
      REDDB_TOPOLOGY: primary-replica
      REDDB_NODE_ROLE: replica
      REDDB_STORAGE_PRESET: primary-replica-production-ha
      REDDB_STORAGE_PROFILE: primary-replica
      REDDB_STORAGE_PACKAGING: operational-directory
      REDDB_REPLICA_COUNT: "2"
      REDDB_PRIMARY_ADDR: http://primary:55055
      REDDB_VAULT: "false"
    ports:
      - "5051:5050"
      - "55056:55055"
      - "5001:5000"
      - "55556:55555"
    depends_on:
      - primary
      - mock-ai

  replica-2:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: reddb-replica-2
    environment:
      REDDB_AI_PROVIDER: openai
      REDDB_OPENAI_API_BASE: http://mock-ai:55436/v1
      REDDB_OPENAI_API_KEY: test-key
      REDDB_OPENAI_PROMPT_MODEL: mock-chat
      REDDB_TOPOLOGY: primary-replica
      REDDB_NODE_ROLE: replica
      REDDB_STORAGE_PRESET: primary-replica-production-ha
      REDDB_STORAGE_PROFILE: primary-replica
      REDDB_STORAGE_PACKAGING: operational-directory
      REDDB_REPLICA_COUNT: "2"
      REDDB_PRIMARY_ADDR: http://primary:55055
      REDDB_VAULT: "false"
    ports:
      - "5052:5050"
      - "55057:55055"
      - "5002:5000"
      - "55557:55555"
    depends_on:
      - primary
      - mock-ai
