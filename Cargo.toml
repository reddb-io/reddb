[package]
name = "reddb"
version = "0.1.2"
edition = "2021"
authors = ["RedBlue Team"]
description = "Unified multi-model database: tables, documents, graphs, vectors, and key-value in one engine"
license = "MIT"
homepage = "https://github.com/forattini-dev/reddb"
repository = "https://github.com/forattini-dev/reddb"
documentation = "https://docs.rs/reddb"
readme = "README.md"
keywords = ["database", "vector-search", "graph", "document-store", "rust"]
categories = ["database-implementations", "data-structures"]
include = [
    "src/**/*.rs",
    "benches/**/*.rs",
    "proto/**/*.proto",
    "build.rs",
    "README.md",
    "Cargo.toml",
    "LICENSE",
    "CHANGELOG.md",
    "RELEASE.md"
]

[[bin]]
name = "red"
path = "src/bin/red.rs"

[dependencies]
aes-gcm = "0.10"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tonic = { version = "0.12", features = ["transport"] }
prost = "0.13"
ureq = { version = "2.10", default-features = false, features = ["tls"] }
rayon = "1.10"
roaring = "0.10"
rstar = "0.12"

[features]
default = []
query-vector = []
query-graph = []
query-fulltext = []
encryption = []
backend-s3 = []
backend-turso = []
backend-d1 = []

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[build-dependencies]
tonic-build = "0.12"

[[bench]]
name = "bench_embedded"
harness = false

[[bench]]
name = "bench_profiles"
harness = false
