[package]
name = "reddb"
version = "0.2.4"
edition = "2021"
authors = ["RedBlue Team"]
description = "Unified multi-model database: tables, documents, graphs, vectors, and key-value in one engine"
license = "AGPL-3.0-only"
homepage = "https://github.com/forattini-dev/reddb"
repository = "https://github.com/forattini-dev/reddb"
documentation = "https://docs.rs/reddb"
readme = "README.md"
keywords = ["database", "vector-search", "graph", "document-store", "rust"]
categories = ["database-implementations", "data-structures"]
include = [
    "/src/**/*.rs",
    "/benches/**/*.rs",
    "/proto/**/*.proto",
    "/docs/spec/admin-api.openapi.yaml",
    "/build.rs",
    "/README.md",
    "/Cargo.toml",
    "/LICENSE",
    "/CHANGELOG.md",
    "/RELEASE.md",
]

[[bin]]
name = "red"
path = "src/bin/red.rs"

[dependencies]
aes-gcm = "0.10"
hmac = "0.13"
itoa = "1"
zstd = { version = "0.13", default-features = false }
lz4_flex = { version = "0.13", default-features = false, features = ["std"] }
sha2 = "0.11"
hex = "0.4"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "signal"] }
tokio-stream = { version = "0.1", features = ["net"] }
tonic = { version = "0.14", features = ["transport", "gzip", "zstd"] }
tonic-prost = "0.14"
prost = "0.14"
ureq = { version = "3.3", default-features = false, features = ["rustls"] }
roaring = "0.11"
parking_lot = "0.12"
rayon = "1.12"
rstar = "0.12"
regex = "1"
fs2 = "0.4"
tokio-rustls = { version = "0.26", default-features = false, features = ["tls12", "logging", "ring"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std"] }
rustls-pemfile = "2"
rcgen = "0.14"
tracing = "0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "env-filter",
    "fmt",
    "json",
    "ansi",
    "registry",
] }
tracing-appender = "0.2"

[features]
default = []
backend-s3 = []
backend-turso = []
backend-d1 = []
# PLAN.md Phase 5.3 — OpenTelemetry tracing. Opt-in (`--features otel`)
# so the OTLP dependency tree doesn't bloat the default build. The
# feature gate compiles the scaffolding in src/telemetry/otel.rs
# but the OTLP client integration lands when the operator confirms
# their collector and the dep tree review passes.
otel = []

[dev-dependencies]
# `default-features = false` drops criterion's optional `rayon` dep
# (~10 transitive crates we don't need for our microbenches) and
# the `cast` crate. We keep `html_reports` for local plots.
criterion = { version = "0.8", default-features = false, features = ["html_reports", "plotters", "cargo_bench_support"] }
pprof = { version = "0.15", features = ["flamegraph"] }
# Used by `tests/compile_fail.rs` to assert that misuse of
# `LeaseStore::new` (passing a non-CAS backend) fails to compile.
trybuild = "1"

[build-dependencies]
tonic-build = "0.14"
tonic-prost-build = "0.14"

[[bench]]
name = "bench_embedded"
harness = false

[[bench]]
name = "bench_insert"
harness = false

[[bench]]
name = "perf_sweep"
harness = false

# ---------------------------------------------------------------------
# Build profile tuning — trades runtime perf for build wall time
# where it makes sense.
# ---------------------------------------------------------------------

# `cargo bench` builds in the bench profile. By default that profile
# disables incremental compilation, so every bench rerun recompiles
# the entire crate from scratch — even if only the bench file
# changed. Enabling incremental cuts bench rebuild from ~7 minutes
# (cold-ish) to ~30 seconds (warm) on this codebase.
[profile.bench]
incremental = true

# Dev profile already has `incremental = true` by default. We bump
# `codegen-units` so the linker can parallelise more aggressively
# at the cost of a tiny runtime hit (we don't care about runtime
# in dev). 256 is the cargo-stable sweet spot for crates of this
# size.
[profile.dev]
incremental = true
codegen-units = 256

# Test profile inherits from dev, but we restate the values so the
# intent is explicit and `cargo test` is as fast as `cargo build`.
[profile.test]
incremental = true
codegen-units = 256

# Production binaries abort on panic. RedDB relies on WAL/recovery for
# consistency after process death; unwinding through worker/write paths
# risks leaving application-layer state half-mutated.
[profile.release]
panic = "abort"

# Fast-build variant of release. Trades ~5-10% runtime perf for
# ~3× faster cold build of the `red` binary. Use for local smoke
# tests and CI artifacts where release speed matters more than
# microbenchmark numbers:
#
#     cargo build --profile release-fast --bin red
#
# Shipping binaries should still use `--release` (default profile).
[profile.release-fast]
inherits = "release"
# opt-level = 1 skips the expensive LLVM passes (inlining,
# vectorisation, loop opts) while keeping basic register alloc and
# dead-code elim. reddb lib compile drops from 6 min → ~2 min in
# this profile. Runtime ~2-3× slower than release, but smoke
# tests still finish in seconds.
opt-level = 1
# 256 codegen units lets LLVM parallelise across all cores. Default
# release is 16.
codegen-units = 256
# LTO is already off in default release. Restate for clarity.
lto = false
# Strip symbols — cuts link time and shrinks the binary ~40%.
strip = "symbols"
# Debug info generation dominates a surprising slice of bin link
# time. 0 = no debuginfo.
debug = 0
# Keep incremental on for warm rebuilds. Release has it off by
# default because incremental hurts runtime perf slightly; in
# release-fast we already traded runtime for build time.
incremental = true

# PLAN.md Phase 7.2 — static-binary-friendly profile for the
# distributed v1.0 release builds. Aggressive size optimisation
# (`opt-level = "z"`), full LTO, single codegen unit, strip
# everything. Build with:
#
#   cargo build --profile release-static --bin red \
#     --target x86_64-unknown-linux-musl
#
# CI uses an Alpine container + musl toolchain so the resulting
# binary has zero glibc dependency and runs on every Linux distro
# (`scratch`-based containers, busybox, etc.). Target binary size
# < 30 MB after strip, < 12 MB after `upx --best`.
[profile.release-static]
inherits = "release"
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = "symbols"
debug = false
panic = "abort"
incremental = false
