[package]
name = "reddb"
version = "0.1.0"
edition = "2021"
authors = ["RedBlue Team"]
description = "Unified multi-model database: tables, documents, graphs, vectors, and key-value in one engine"
license = "MIT"

[dependencies]
aes-gcm = "0.10"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tonic = { version = "0.12", features = ["transport"] }
prost = "0.13"

[features]
default = []
query-vector = []
query-graph = []
query-fulltext = []
encryption = []

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[build-dependencies]
tonic-build = "0.12"

[[bench]]
name = "bench_embedded"
harness = false

[[bench]]
name = "bench_profiles"
harness = false
